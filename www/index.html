<style>
/* =========================================================================
   LUMIDRA — feuille de style statique (remplace Tailwind, aucune dépendance)
   Échelle d'espacement identique à l'échelle par défaut de Tailwind (0.25rem/unité)
   ========================================================================= */

@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:500; font-display:swap; src:url('fonts/baloo-2-latin-500-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:600; font-display:swap; src:url('fonts/baloo-2-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/baloo-2-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:800; font-display:swap; src:url('fonts/baloo-2-latin-800-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:400; font-display:swap; src:url('fonts/nunito-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:600; font-display:swap; src:url('fonts/nunito-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/nunito-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:800; font-display:swap; src:url('fonts/nunito-latin-800-normal.woff2') format('woff2'); }

:root {
  --ink:#3A2E2A; --ink-soft:#806B5E; --sky:#F3F6FB; --parchment:#FFFCF6;
  --gold:#EDA23C; --gold-deep:#C97A1F; --gold-deep-btn:#D5862B;
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  background: var(--sky);
  font-family: 'Nunito', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, input { font: inherit; color: inherit; }
button { cursor:pointer; background:none; border:none; padding:0; text-align:inherit; }
img, svg { display:block; }

/* ---- iOS Safari : zone tactile propre, pas de zoom ni sélection parasites ---- */
.lumidra-root {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
.lumidra-root input {
  -webkit-user-select: text;
  user-select: text;
}
/* Toute saisie doit rester ≥16px : sous ce seuil, iOS Safari force un zoom automatique au focus. */
.lumidra-root input[type="text"],
.lumidra-root input:not([type]) {
  font-size: 16px !important;
}

.font-display { font-family: 'Baloo 2', system-ui, sans-serif; }
.font-body { font-family: 'Nunito', system-ui, sans-serif; }

/* ---- typographie ---- */
.text-xs   { font-size:.75rem; line-height:1rem; }
.text-sm   { font-size:.875rem; line-height:1.25rem; }
.text-base { font-size:1rem; line-height:1.5rem; }
.text-lg   { font-size:1.125rem; line-height:1.75rem; }
.text-xl   { font-size:1.25rem; line-height:1.75rem; }
.text-2xl  { font-size:1.5rem; line-height:2rem; }
.text-3xl  { font-size:1.875rem; line-height:2.25rem; }
.fs-8  { font-size:8px; }
.fs-9  { font-size:9px; }
.fs-10 { font-size:10px; }
.fs-11 { font-size:11px; }
.fs-13 { font-size:13px; }
.font-semibold { font-weight:600; }
.font-bold      { font-weight:700; }
.font-extrabold { font-weight:800; }
.text-center { text-align:center; }
.text-left   { text-align:left; }
.text-white  { color:#fff; }
.leading-tight    { line-height:1.2; }
.leading-relaxed  { line-height:1.6; }
.whitespace-nowrap{ white-space:nowrap; }

/* ---- layout ---- */
.flex        { display:flex; }
.inline-flex { display:inline-flex; }
.grid        { display:grid; }
.block       { display:block; }
.flex-col    { flex-direction:column; }
.flex-1      { flex:1 1 0%; }
.shrink-0    { flex-shrink:0; }
.items-center{ align-items:center; }
.justify-center { justify-content:center; }
.justify-between{ justify-content:space-between; }
.justify-around { justify-content:space-around; }
.grid-cols-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
.grid-cols-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
.grid-cols-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
.-space-x-2 > * + * { margin-left:-8px; }
.relative { position:relative; }
.absolute { position:absolute; }
.inset-0  { top:0; right:0; bottom:0; left:0; }
.top-0\.5 { top:2px; } .top-1\.5 { top:6px; } .top-3 { top:12px; }
.right-1\.5{ right:6px; } .right-3 { right:12px; } .right-4 { right:16px; }
.left-4   { left:16px; }
.z-50     { z-index:50; }
.overflow-hidden { overflow:hidden; }
.overflow-x-auto { overflow-x:auto; }
.overflow-y-auto { overflow-y:auto; }
.pointer-events-none { pointer-events:none; }
.mx-auto  { margin-left:auto; margin-right:auto; }

/* ---- espacements (échelle Tailwind : n × 4px) ---- */
.gap-0\.5{gap:2px;} .gap-1{gap:4px;} .gap-1\.5{gap:6px;} .gap-2{gap:8px;}
.gap-2\.5{gap:10px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
.p-1\.5{padding:6px;} .p-2{padding:8px;} .p-2\.5{padding:10px;} .p-3{padding:12px;}
.p-3\.5{padding:14px;} .p-4{padding:16px;}
.px-1\.5{padding-left:6px;padding-right:6px;} .px-2{padding-left:8px;padding-right:8px;}
.px-2\.5{padding-left:10px;padding-right:10px;} .px-3{padding-left:12px;padding-right:12px;}
.px-3\.5{padding-left:14px;padding-right:14px;} .px-4{padding-left:16px;padding-right:16px;}
.px-6{padding-left:24px;padding-right:24px;}
.py-0\.5{padding-top:2px;padding-bottom:2px;} .py-1\.5{padding-top:6px;padding-bottom:6px;}
.py-2{padding-top:8px;padding-bottom:8px;} .py-2\.5{padding-top:10px;padding-bottom:10px;}
.py-3{padding-top:12px;padding-bottom:12px;} .py-8{padding-top:32px;padding-bottom:32px;}
.pt-2{padding-top:8px;} .pt-4{padding-top:16px;}
.pb-1{padding-bottom:4px;} .pb-2{padding-bottom:8px;} .pb-4{padding-bottom:16px;} .pb-5{padding-bottom:20px;}
.mt-1{margin-top:4px;} .mt-1\.5{margin-top:6px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;}
.mb-1{margin-bottom:4px;} .mb-1\.5{margin-bottom:6px;} .mb-2{margin-bottom:8px;} .mb-2\.5{margin-bottom:10px;}
.mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;} .mb-6{margin-bottom:24px;}
.ml-0\.5{margin-left:2px;}

/* ---- tailles ---- */
.w-1\.5{width:6px;} .h-1\.5{height:6px;} .h-2{height:8px;}
.w-5{width:20px;} .h-5{height:20px;} .h-6{height:24px;}
.w-8{width:32px;} .h-8{height:32px;} .w-9{width:36px;} .h-9{height:36px;}
.w-10{width:40px;} .h-10{height:40px;} .w-11{width:44px;} .w-24{width:96px;}
.w-full{width:100%;} .h-full{height:100%;}

/* ---- forme / couleur / ombre ---- */
.rounded-xl  { border-radius:12px; }
.rounded-2xl { border-radius:16px; }
.rounded-3xl { border-radius:24px; }
.rounded-full{ border-radius:9999px; }
.bg-white { background:#fff; }
.shadow-sm{ box-shadow:0 1px 3px rgba(0,0,0,.08); }
.shadow-lg{ box-shadow:0 6px 16px rgba(0,0,0,.18); }

/* =========================================================================
   COMPOSANTS ET MOTIFS RÉPÉTÉS
   ========================================================================= */

.lumidra-root { -webkit-tap-highlight-color: transparent; }
.lumidra-root * { box-sizing:border-box; }

.btn-primary {
  font-family:'Baloo 2'; font-weight:700; color:var(--ink);
  background:linear-gradient(135deg,var(--gold),var(--gold-deep-btn));
  padding:13px; border-radius:16px; font-size:14px;
  box-shadow:0 3px 10px rgba(201,122,31,0.25);
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:auto;
  transition: transform .08s ease, filter .08s ease;
}
.btn-primary.full { width:100%; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary:active:not(:disabled) { transform:scale(0.97); filter:brightness(0.96); }
.btn-ghost {
  font-family:'Baloo 2'; font-weight:700; padding:13px; border-radius:16px;
  font-size:14px; background:#F1ECE2; color:var(--ink);
  transition: transform .08s ease;
}
.btn-ghost:active { transform:scale(0.97); }

/* ---- retour tactile générique : tout élément actionnable réagit visiblement au tap ---- */
[data-action] { transition: transform .08s ease, filter .08s ease, opacity .08s ease; }
[data-action]:active:not(:disabled) { transform:scale(0.96); filter:brightness(0.97); }
button:disabled { cursor:not-allowed; }

/* ---- zones de sécurité iOS (encoche, Dynamic Island, barre gestuelle) ---- */
.safe-top    { padding-top: max(16px, env(safe-area-inset-top)); }
.safe-bottom { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.safe-bottom-sheet { padding-bottom: max(26px, env(safe-area-inset-bottom)); }

.modal-overlay {
  position:absolute; inset:0; background:rgba(58,46,42,0.45);
  display:flex; align-items:flex-end; justify-content:center; z-index:50;
}
.modal-sheet {
  background:var(--parchment); border-radius:28px 28px 0 0; padding:26px 22px;
  width:100%; display:flex; flex-direction:column; align-items:center;
  position:relative; max-height:82%; overflow-y:auto;
}
.hatch-sheet { padding-top:34px; align-items:center; text-align:center; }
.hatch-glow {
  position:absolute; top:6px; left:50%; transform:translateX(-50%);
  width:260px; height:260px; border-radius:50%; pointer-events:none;
}

/* ---- verrou parental par appui long ---- */
.hold-gate {
  position:relative; width:80px; height:80px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--parchment); -webkit-user-select:none; user-select:none;
  transition: transform .12s ease, background .15s ease;
}
.hold-gate-ring { position:absolute; inset:0; }
#hold-gate-progress { transition: stroke-dashoffset .05s linear, stroke .2s ease; }
.hold-gate-icon { position:relative; z-index:1; pointer-events:none; display:flex; }
.hold-gate:active { filter:brightness(0.97); }
.hold-gate--pressed { transform:scale(0.94); background:#FFF3DC; }
.hold-gate--success { transform:scale(1.08); background:#FFF3DC; }
@keyframes lumidra-check-pop { 0%{transform:scale(0.4);opacity:0;} 60%{transform:scale(1.15);opacity:1;} 100%{transform:scale(1);opacity:1;} }
.hold-gate-icon--success { animation: lumidra-check-pop .35s cubic-bezier(.25,.9,.3,1.3); }

input[type="text"], input[type="tel"] {
  border:none; outline:none;
}
input:focus { outline:2px solid var(--gold); }
button:focus-visible { outline:2px solid var(--gold-deep); outline-offset:2px; }

/* ---- animations ---- */
@keyframes lumidra-pop   { 0%{transform:scale(.5);opacity:0;} 60%{transform:scale(1.08);opacity:1;} 100%{transform:scale(1);opacity:1;} }
@keyframes lumidra-pulse { 0%,100%{opacity:.7;transform:scale(1);} 50%{opacity:1;transform:scale(1.06);} }
@keyframes lumidra-float { 0%{transform:translateY(0) scale(.6);opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-40px) scale(1);opacity:0;} }
@keyframes lumidra-fadeup{ 0%{opacity:0;transform:translateY(8px);} 100%{opacity:1;transform:translateY(0);} }
@keyframes lumidra-shake { 0%,100%{transform:translateX(0) rotate(0);} 25%{transform:translateX(-3px) rotate(-2.5deg);} 75%{transform:translateX(3px) rotate(2.5deg);} }
.anim-pop    { animation: lumidra-pop .5s cubic-bezier(.25,.9,.3,1.2); }
.anim-pulse  { animation: lumidra-pulse 2.2s ease-in-out infinite; }
.anim-float  { animation: lumidra-float 1.4s ease-out forwards; }
.anim-fadeup { animation: lumidra-fadeup .35s ease both; }
.anim-shake  { animation: lumidra-shake .3s ease; }

@media (prefers-reduced-motion: reduce) {
  .anim-pop,.anim-pulse,.anim-float,.anim-fadeup,.anim-shake { animation:none !important; }
}

/* ---- accessibilité clavier / états ---- */
[data-action]:focus-visible { outline:2px solid var(--gold-deep); outline-offset:2px; border-radius:8px; }

body { display:flex; justify-content:center; align-items:flex-start; min-height:100vh; min-height:100dvh; }
#lumidra-app { width:100%; max-width:430px; height:100vh; height:100dvh; max-height:900px; background:var(--sky); position:relative; overflow:hidden; display:flex; flex-direction:column; }
#main-shell { display:flex; flex-direction:column; height:100%; min-height:0; }
@media (min-width:431px) {
  body { background:#e2e5ea; padding:24px 0; }
  #lumidra-app { border-radius:28px; box-shadow:0 12px 40px rgba(0,0,0,.18); height:844px; }
}
</style>
</head>
<body>
<div id="lumidra-app" class="lumidra-root">
  <div id="onboarding-root"></div>
  <div id="main-shell">
    <div id="topbar-root"></div>
    <div id="screen-root" class="flex-1" style="display:flex;flex-direction:column;min-height:0;"></div>

  <div id="toast-root" aria-live="polite" aria-atomic="true"></div>

<script>
/* =========================================================================
   LUMIDRA — données et logique pure (aucune dépendance, portage fidèle)
   ========================================================================= */

const ELEMENTS = {
  feu:     { name: 'Feu',     base: '#E8734A', light: '#F7B98C', deep: '#B54F2C', icon: 'flame' },

const INK = '#3A2E2A';

const STAGE_LABEL = { bebe: 'Bébé', juvenile: 'Juvénile', adulte: 'Adulte' };
const TEMPERAMENTS = ['Calme', 'Joueur', 'Audacieux', 'Loyal'];
/* ---- effets doux du tempérament (jamais punitifs, juste une légère couleur de jeu) ---- */
const TEMPERAMENT_EFFECTS = {
  Calme:     { happinessDecayMult: 0.7,  cooldownMult: 1.0,  eclatBonus: 0  },
  Joueur:    { happinessDecayMult: 1.15, cooldownMult: 0.85, eclatBonus: 4  },

const CARE_COOLDOWN_MS = 90000; // 1 min 30 — un vrai temps de pause, plus une boucle instantanée

const HAPPINESS_FLOOR = 30;           // un dragon négligé reste triste, jamais "cassé"
const HAPPINESS_DECAY_FULL_MS = 6 * 3600 * 1000; // 6h sans soin → bonheur au plancher
const SAVE_KEY = 'lumidra-save-v2';

const SCHEMA_VERSION = 2;
/* ---- friandise : un sink d'écailles pérenne (répétable) plutôt qu'un pur achat cosmétique unique.
   Contrairement au décor (acheté une fois pour toutes), elle reste utile toute la vie du dragon,

const TREAT_COST = 40;

const SPECIES = [

/* ---- quêtes du jour : contenu court renouvelé chaque jour pour donner un but au-delà de la collection ---- */
const DAILY_QUEST_TEMPLATES = [
  { id: 'soin',  label: 'Câliner un dragon',          target: 1, reward: 20 },
  { id: 'expe',  label: "Lancer une expédition",       target: 1, reward: 25 },
  { id: 'ecaille', label: 'Gagner 60 écailles',        target: 60, reward: 30 },
];
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function ensureDailyQuests() {
  const key = todayKey();
  if (state.dailyQuests && state.dailyQuests.dateKey === key) return;
  state.dailyQuests = {
    dateKey: key,
    quests: DAILY_QUEST_TEMPLATES.map(t => ({ id: t.id, label: t.label, target: t.target, reward: t.reward, progress: 0, done: false, claimed: false })),
  };
}
function bumpDailyQuest(id, amount) {
  ensureDailyQuests();
  const q = state.dailyQuests.quests.find(x => x.id === id);
  if (!q || q.done) return;
  q.progress = Math.min(q.target, q.progress + amount);
  if (q.progress >= q.target) q.done = true;
}
function claimDailyQuest(questId) {
  ensureDailyQuests();
  const q = state.dailyQuests.quests.find(x => x.id === questId);
  if (!q || !q.done || q.claimed) return;
  q.claimed = true;
  state.ecailles += q.reward;
  saveStateDebounced();
  showToast(`+${q.reward} écailles — quête terminée !`);
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
}

/* ---- utilitaires purs ---- */

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function speciesById(id) { return ALL_SPECIES.find(s => s.id === id); }
function requiredHatchTaps(species) { return [3, 3, 4, 5, 6][species.variant] || 3; }
function computeStage(careCount) { return careCount >= 12 ? 'adulte' : careCount >= 5 ? 'juvenile' : 'bebe'; }
function computeLevel(xp) { return Math.floor(xp / 60) + 1; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function fmtCountdown(ms) {
  if (ms <= 0) return '00:00';
  const s = Math.ceil(ms / 1000);
  if (s >= 3600) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${h}h ${String(m).padStart(2, '0')}min`;
  }
  const m = Math.floor(s / 60);
  const r = s % 60;
  return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
}

function weightedSpeciesFromZone(zone) {
  const pool = SPECIES.filter(s => zone.elements.includes(s.element));
  const weighted = [];
  pool.forEach(s => { const w = s.variant <= 1 ? 5 : s.variant === 2 ? 2 : 1; for (let i = 0; i < w; i++) weighted.push(s); });
  return weighted[randInt(0, weighted.length - 1)];
}

/* ---- compression douce au-delà du "genou" : au lieu d'un plafond dur à 100 qui rendait le soin et le
   tempérament invisibles dès qu'un dragon rare/épique/légendaire approchait du maximum, les valeurs sous
   le genou (72) passent telles quelles (aucun changement pour les dragons communs), et celles au-dessus
   s'approchent de 100 sans jamais le figer complètement — deux dragons légendaires, l'un choyé et l'autre
   négligé, restent donc mesurablement différents au lieu d'être tous deux collés à 100. ---- */
function softCapStat(raw) {
  const knee = 72, room = 28;
  if (raw <= knee) return Math.max(5, Math.round(raw));
  const excess = raw - knee;
  const compressed = knee + room * (1 - Math.exp(-excess / (room * 1.6)));
  return Math.min(100, Math.round(compressed));
}

function computeDragonStats(dragon, zone) {
  const s = speciesById(dragon.speciesId);
  const rarityBase = [30, 30, 45, 60, 80][s.variant];
  const stageBonus = { bebe: 0, juvenile: 8, adulte: 16 }[dragon.stage];
  const temp = TEMPERAMENT_EFFECTS[dragon.temperament] || {};
  const happiness = computeHappiness(dragon);
  const happinessMod = (happiness - 60) / 4; // -7.5 .. +10, léger, jamais décisif seul
  const rawVigueur = rarityBase + stageBonus + (temp.vigueurBonus || 0) + happinessMod;
  const rawEclat = rarityBase + stageBonus + (zone.elements.includes(s.element) ? 20 : 0) + (temp.eclatBonus || 0) + happinessMod;
  return { vigueur: softCapStat(rawVigueur), eclat: softCapStat(rawEclat) };
}

/* ---- bonheur dérivé : décroît doucement depuis le dernier événement positif (naissance, soin ou friandise) ----
   Corrigé : un dragon jamais câliné décroît désormais depuis sa naissance, exactement comme un dragon
   câliné puis délaissé. Avant ce correctif, l'absence totale de soin restait figée à 70 pour toujours
   (lastCareAt valait 0, donc falsy) — ignorer un dragon depuis le début était accidentellement "plus sûr"
   que le câliner une fois puis l'abandonner. */
function computeHappiness(dragon) {
  const referenceAt = Math.max(dragon.lastCareAt || 0, dragon.happinessBoostAt || 0, dragon.bornAt || 0) || Date.now();
  const elapsed = Date.now() - referenceAt;
  const temp = TEMPERAMENT_EFFECTS[dragon.temperament] || {};
  const decayMult = temp.happinessDecayMult || 1;
  const ratio = Math.min(1, (elapsed * decayMult) / HAPPINESS_DECAY_FULL_MS);
  return Math.round(100 - ratio * (100 - HAPPINESS_FLOOR));
}

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}


/* =========================================================================
   LUMIDRA — icônes SVG (aucune dépendance externe, style "lucide")
   viewBox 0 0 24 24, stroke-based, remplace lucide-react
   ========================================================================= */

function polarPoint(cx, cy, r, angleDeg) {
  const a = (angleDeg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}

function starPath(cx, cy, rOuter, rInner, points) {
  let d = '';
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? rOuter : rInner;
    const [x, y] = polarPoint(cx, cy, r, (360 / (points * 2)) * i);
    d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
  }
  return d + 'Z';
}

function sunRays(cx, cy, rInner, rOuter, count) {
  let out = '';
  for (let i = 0; i < count; i++) {
    const [x1, y1] = polarPoint(cx, cy, rInner, (360 / count) * i);
    const [x2, y2] = polarPoint(cx, cy, rOuter, (360 / count) * i);
    out += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"/>`;
  }
  return out;
}

function gearTeeth(cx, cy, rInner, rOuter, count, toothWidthDeg) {
  let out = '';
  for (let i = 0; i < count; i++) {
    const mid = (360 / count) * i;
    const a1 = mid - toothWidthDeg / 2, a2 = mid + toothWidthDeg / 2;
    const [ix1, iy1] = polarPoint(cx, cy, rInner, a1);
    const [ox1, oy1] = polarPoint(cx, cy, rOuter, a1);
    const [ox2, oy2] = polarPoint(cx, cy, rOuter, a2);
    const [ix2, iy2] = polarPoint(cx, cy, rInner, a2);
    out += `<path d="M${ix1.toFixed(2)},${iy1.toFixed(2)} L${ox1.toFixed(2)},${oy1.toFixed(2)} L${ox2.toFixed(2)},${oy2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)}"/>`;
  }
  return out;
}

/**
 * icon(name, opts) → chaîne SVG. opts: {size, color, strokeWidth, className}
 */
function icon(name, opts) {
  opts = opts || {};
  const size = opts.size || 18;
  const color = opts.color || 'currentColor';
  const sw = opts.strokeWidth || 2;
  const cls = opts.className ? ` class="${opts.className}"` : '';
  const inner = ICON_INNER[name] || '';
  return `<svg${cls} width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;

/* =========================================================================
   LUMIDRA — art procédural des dragons et des œufs (SVG, sans dépendance)
   V2 : ailes proéminentes façon chauve-souris (toujours visibles dès le
   stade juvénile), épines dorsales, museau et canine — plus proche de
   l'archétype visuel du dragon tout en restant doux et non-menaçant.
   ========================================================================= */

let __svgUidCounter = 0;
function nextSvgUid() { return 'u' + (__svgUidCounter++); }

function teardropPath(cx, cy, scale, rotation) {
  return `<path transform="translate(${cx},${cy}) rotate(${rotation}) scale(${scale})" d="M0,-10 C6,-4 6,4 0,10 C-6,4 -6,-4 0,-10 Z"`;
}

function elementAccentsSVG(element, variant, tailX, tailY, headX, headY) {
  const c = ELEMENTS[element];
  const tailScale = [0.8, 1.0, 1.15, 1.3][variant];
  const headScale = [0, 0, 0.7, 0.9][variant];
  let out = '';

  if (element === 'feu') {
    out += `${teardropPath(tailX, tailY, tailScale, 0)} fill="${c.base}" stroke="${c.deep}" stroke-width="${1.1 * tailScale}"/>`;
    if (headScale) out += `${teardropPath(headX, headY, headScale, 0)} fill="${c.light}" stroke="${c.base}" stroke-width="${1.1 * headScale}"/>`;
  } else if (element === 'eau') {
    out += `${teardropPath(tailX, tailY, tailScale, 180)} fill="${c.base}" opacity="0.9" stroke="${c.deep}" stroke-width="${1.1 * tailScale}"/>`;
    if (headScale) out += `${teardropPath(headX, headY, headScale, 180)} fill="${c.light}" opacity="0.9" stroke="${c.base}" stroke-width="${1.1 * headScale}"/>`;
  } else if (element === 'terre') {
    out += `<path transform="translate(${tailX},${tailY}) scale(${tailScale})" d="M-8,6 L-4,-7 L6,-8 L9,4 L2,9 Z" fill="${c.deep}"/>`;
    if (headScale) out += `<path transform="translate(${headX},${headY}) scale(${headScale})" d="M-8,6 L-4,-7 L6,-8 L9,4 L2,9 Z" fill="${c.base}"/>`;
  } else if (element === 'air') {
    const cloud = (cx, cy, s) => `<g transform="translate(${cx},${cy}) scale(${s})" opacity="0.85"><circle cx="-6" cy="2" r="5" fill="${c.light}"/><circle cx="0" cy="-3" r="6" fill="${c.light}"/><circle cx="6" cy="2" r="5" fill="${c.light}"/></g>`;
    out += cloud(tailX, tailY, tailScale);
    out += cloud((tailX + headX) / 2, (tailY + headY) / 2 + 10, tailScale * 0.7);
    if (headScale) out += cloud(headX, headY, headScale);
  } else if (element === 'lumiere') {
    const star = (cx, cy, s, fill) => `<path transform="translate(${cx},${cy}) scale(${s})" d="M0,-9 L2.5,-2.5 L9,0 L2.5,2.5 L0,9 L-2.5,2.5 L-9,0 L-2.5,-2.5 Z" fill="${fill}"/>`;
    out += star(tailX, tailY, tailScale, c.base);
    out += star(headX - 14, headY - 6, Math.max(0.6, headScale), c.base);
    out += star(headX + 16, headY + 4, Math.max(0.5, headScale * 0.8), c.light);
  } else { // nature
    const leaf = (cx, cy, s, rot) => `<g transform="translate(${cx},${cy}) rotate(${rot}) scale(${s})"><path d="M0,-10 C6,-4 6,4 0,10 C-6,4 -6,-4 0,-10 Z" fill="${c.base}"/><line x1="0" y1="-7" x2="0" y2="7" stroke="${c.deep}" stroke-width="1.1" stroke-linecap="round"/></g>`;
    out += leaf(tailX, tailY, tailScale, -20);
    if (headScale) {
      out += leaf(headX, headY, headScale, 15);
      if (variant === 3) {
        let petals = '';
        for (let i = 0; i < 5; i++) {
          const a = (i * 72 - 90) * Math.PI / 180;
          petals += `<circle cx="${(Math.cos(a) * 6).toFixed(2)}" cy="${(Math.sin(a) * 6).toFixed(2)}" r="4" fill="${c.light}"/>`;
        }
        out += `<g transform="translate(${headX + 18},${headY - 4}) scale(0.9)">${petals}<circle cx="0" cy="0" r="3" fill="${c.deep}"/></g>`;
      }
    }
  }
  return out;
}

function hornsSVG(variant, fill) {
  if (variant === 0) return `<path d="M100,34 L94,52 L106,52 Z" fill="${fill}"/>`;
  if (variant === 1) return `<path d="M82,42 L76,58 L88,58 Z" fill="${fill}"/><path d="M118,42 L124,58 L112,58 Z" fill="${fill}"/>`;
  if (variant === 2) return `<path d="M85,46 Q78,28 90,24 Q85,38 88,48 Z" fill="${fill}"/><path d="M115,46 Q122,28 110,24 Q115,38 112,48 Z" fill="${fill}"/>`;
  return `<path d="M85,44 Q75,22 90,18 Q84,36 87,47 Z" fill="${fill}"/><path d="M115,44 Q125,22 110,18 Q116,36 113,47 Z" fill="${fill}"/>
    <path d="M70,58 L62,50 L68,64 Z" fill="${fill}" opacity="0.85"/><path d="M130,58 L138,50 L132,64 Z" fill="${fill}" opacity="0.85"/>`;
}

const WING_MEMBRANE_D = 'M0,0 L14,-34 Q28,-28 30,-14 L52,-6 Q54,12 39,20 Q19,25 0,6 Z';
const WING_STRUTS = [
  { x: 14, y: -34 },
  { x: 30, y: -14 },
  { x: 52, y: -6 },
];

function wingSVG(mirror, scale, fill, stroke) {
  const scaleX = mirror ? -scale : scale;
  let struts = '';
  WING_STRUTS.forEach(p => { struts += `<line x1="0" y1="0" x2="${p.x}" y2="${p.y}" stroke="${stroke}" stroke-width="1" opacity="0.55"/>`; });
  return `<g transform="scale(${scaleX},${scale})">
    <path d="${WING_MEMBRANE_D}" fill="${fill}" opacity="0.88" stroke="${stroke}" stroke-width="1.6"/>
    ${struts}
  </g>`;
}

function backSpikesSVG(count, fill) {
  const pts = [];
  for (let i = 0; i < count; i++) {
    const t = i / (count - 1);
    pts.push({ x: 100 - 8 * (1 - t) - 2, y: 92 + t * 46, s: 1 - t * 0.35 });
  }
  return pts.map(p => `<path transform="translate(${p.x},${p.y}) scale(${p.s})" d="M-6,4 L0,-9 L6,4 Z" fill="${fill}"/>`).join('');
}

function dragonSVG(opts) {
  const element = opts.element, variant = opts.variant, stage = opts.stage || 'adulte', size = opts.size || 100;
  const isLegendary = variant >= 4;
  const visualVariant = Math.min(variant, 3); // les tableaux de forme s'arrêtent à l'épique ; le légendaire réutilise l'épique + halo
  const c = ELEMENTS[element];
  const idStr = nextSvgUid();
  const gradId = `grad-${element}-${idStr}`;

  const overallScale = stage === 'bebe' ? 0.72 : stage === 'juvenile' ? 0.87 : 1.0;
  const headBoost = stage === 'bebe' ? 1.22 : stage === 'juvenile' ? 1.06 : 1.0;
  const wingsOn = stage !== 'bebe';
  const wingScale = (stage === 'juvenile' ? 0.85 : 1.0) * (0.86 + visualVariant * 0.05);
  const hornScale = (stage === 'bebe' ? 0.7 : stage === 'juvenile' ? 0.9 : 1.0) * (1 + visualVariant * 0.12) * (isLegendary ? 1.18 : 1);

  const legendarySparkles = isLegendary && stage === 'adulte' ? legendarySparklesSVG() : '';

  return `<svg viewBox="0 0 200 200" width="${size}" height="${size}" role="img" aria-label="Dragon ${c.name}${isLegendary ? ', légendaire' : ''}">

      <ellipse cx="118" cy="168" rx="12" ry="7" fill="${c.deep}" opacity="0.9"/>
      <path d="M126,150 C155,148 172,130 178,150 C182,168 165,178 148,172 C138,168 130,160 126,150 Z" fill="url(#${gradId})"/>
      ${wings}
      <ellipse cx="100" cy="124" rx="50" ry="42" fill="url(#${gradId})" ${legendaryOutline}/>
      <ellipse cx="100" cy="138" rx="30" ry="22" fill="${c.light}" opacity="0.55"/>
      ${spikes}
      ${elementAccentsSVG(element, visualVariant, tailTip.x, tailTip.y, headAccent.x, headAccent.y)}
      <g transform="translate(100,72) scale(${headBoost}) translate(-100,-72)">
        <ellipse cx="100" cy="76" rx="22" ry="14" fill="url(#${gradId})"/>
        <circle cx="100" cy="72" r="33" fill="url(#${gradId})" ${legendaryOutline}/>
        <g transform="translate(100,72) scale(${hornScale}) translate(-100,-72)">${hornsSVG(visualVariant, c.deep)}</g>
        <ellipse cx="76" cy="80" rx="8" ry="6" fill="#FF9E8A" opacity="0.5"/>
        <ellipse cx="124" cy="80" rx="8" ry="6" fill="#FF9E8A" opacity="0.5"/>
        <ellipse cx="86" cy="68" rx="9" ry="10" fill="#FFFFFF"/>
        <ellipse cx="114" cy="68" rx="9" ry="10" fill="#FFFFFF"/>
        <circle cx="88" cy="70" r="5" fill="${INK}"/>
        <circle cx="116" cy="70" r="5" fill="${INK}"/>

function haptic(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) { /* API absente ou refusée : silencieux, ne casse rien */ }
}

/* ---- persistance (localStorage) ---- */
function migrateState(parsed) {
  // v1 → v2 : ajoute les champs introduits par la v2 sans jamais toucher aux données existantes du joueur
  const merged = Object.assign(freshDefaultState(), parsed);
  merged.schemaVersion = SCHEMA_VERSION;
  if (!Array.isArray(merged.legendaryDiscovered)) merged.legendaryDiscovered = [];
  if (!Array.isArray(merged.discovered)) merged.discovered = [];
  return merged;
}
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      state = migrateState(JSON.parse(raw));
      return;
    }
    // pas de sauvegarde v2 : tente une récupération depuis une ancienne sauvegarde v1
    const legacy = localStorage.getItem(SAVE_KEY_LEGACY);
    if (legacy) {
      state = migrateState(JSON.parse(legacy));
      saveStateDebounced();
    }
  } catch (e) { /* sauvegarde illisible : on démarre proprement sur DEFAULT_STATE, aucune donnée à moitié écrite */ }
}
function saveStateDebounced() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    } catch (e) {
      // stockage plein / indisponible (mode privé, quota) : le joueur doit le savoir, pas d'échec silencieux
      showToast('⚠️ Sauvegarde impossible (stockage plein ou indisponible)');
    }
  }, 300);
}

function typeCardHtml(t) {

function activeExpeditionCardHtml(exp) {
  const zone = ZONES.find(z => z.id === exp.zoneId);
  const remaining = exp.endAt - now;
  const ready = remaining <= 0;
  return `<div class="rounded-2xl p-3 flex items-center gap-3" style="background:${ready ? 'linear-gradient(135deg,#FFF3DC,#FCE3B8)' : 'var(--parchment)'}">
    <div class="flex-1">
      <div class="font-display font-bold text-xs" style="color:var(--ink)">${escapeHtml(zone.name)}</div>

    </div>
    ${ready ? `<button data-action="carte-claim" data-exp-id="${exp.id}" class="font-display font-bold text-xs px-3\\.5 py-2 rounded-xl" style="padding:8px 14px;background:var(--gold);color:var(--ink)">Récupérer</button>` : icon('clock', { size: 18, color: 'var(--ink-soft)' })}
  </div>`;
}

function teamPickerHtml(zone, availableDragons) {
  const teamIds = ui.carte.teamIds;
  const team = availableDragons.filter(d => teamIds.includes(d.id));
  const temperamentSet = {};
  team.forEach(d => { temperamentSet[d.temperament] = true; });
  const distinct = Object.keys(temperamentSet).length;
  const harmonyBonus = distinct >= 2 ? 20 : 0;

  let totalVig = 0, totalEclat = 0;
  team.forEach(d => { const st = computeDragonStats(d, zone); totalVig += st.vigueur; totalEclat += st.eclat; });
  const avgVig = team.length ? Math.min(100, Math.round(totalVig / team.length)) : 0;
  const avgEclat = team.length ? softCapStat(totalEclat / team.length + harmonyBonus * 0.3) : 0;
  const harmonie = team.length ? Math.min(100, 30 + harmonyBonus + team.length * 10) : 0;

  let grid;
  if (availableDragons.length === 0) {
    grid = emptyNoteHtml('Aucun dragon disponible pour une équipe.');
  } else {
    grid = `<div class="grid grid-cols-4 gap-2 mb-3">${availableDragons.map(d => {
      const s = speciesById(d.speciesId);
      const picked = teamIds.includes(d.id);
      return `<button data-action="carte-toggle-team-member" data-dragon-id="${d.id}" class="rounded-xl p-1\\.5 flex flex-col items-center relative" style="padding:6px;background:${picked ? '#FFF3DC' : 'var(--parchment)'};outline:${picked ? '2px solid var(--gold)' : 'none'}">
        ${picked ? `<span style="position:absolute;top:4px;right:4px">${icon('check', { size: 11, color: 'var(--gold-deep)' })}</span>` : ''}
        ${dragonSVG({ element: s.element, variant: s.variant, stage: d.stage, size: 44 })}
      </button>`;
    }).join('')}</div>`;
  }

  return `<div>
    ${grid}
    <div class="font-display font-bold text-xs mb-1\\.5" style="margin-bottom:6px;color:var(--ink-soft)">Équipe (${teamIds.length}/3)</div>
    ${statBarHtml('Vigueur', avgVig)}
    ${statBarHtml('Éclat', avgEclat)}
    ${statBarHtml('Harmonie', harmonie)}
    ${harmonyBonus > 0 ? `<div class="font-body font-semibold fs-11 mt-1" style="color:var(--gold-deep)">💡 Tempéraments variés : bonus d'harmonie actif</div>` : ''}
    <button data-action="carte-confirm-team" ${teamIds.length < 2 ? 'disabled' : ''} class="btn-primary full mt-3" style="margin-top:12px;">Lancer l'expédition</button>
  </div>`;
}

function renderScreenCarte() {
  const busy = busyDragonIds();
  const availableDragons = state.dragons.filter(d => !busy[d.id]);
  const c = ui.carte;
  let html = `<div class="flex-1 overflow-y-auto px-4 pb-4">`;

  if (state.expeditions.length > 0) {
    html += `<div class="mb-3 flex flex-col gap-2">${state.expeditions.map(activeExpeditionCardHtml).join('')}</div>`;
  }

  if (c.view === 'zones') {
    html += `<div class="flex flex-col gap-2\\.5" style="gap:10px">
      <h3 class="font-display font-bold text-sm" style="color:var(--ink)">Zones d'expédition</h3>
      ${ZONES.map(z => zoneCardHtml(z, computeLevel(state.xp) < z.unlockLevel)).join('')}
    </div>`;
  } else if (c.view === 'types') {
    const zone = ZONES.find(z => z.id === c.zoneId);
    html += flowPanelHtml(zone.name, EXPEDITION_TYPES.map(typeCardHtml).join(''));
  } else if (c.view === 'pick1') {
    const zone = ZONES.find(z => z.id === c.zoneId);
    let inner;
    if (availableDragons.length === 0) {
      inner = emptyNoteHtml(state.dragons.length === 0 ? "Fais d'abord éclore un dragon dans ton sanctuaire." : 'Tous tes dragons sont déjà en expédition.');
    } else {
      inner = `<div class="grid grid-cols-4 gap-2">${availableDragons.map(d => {
        const s = speciesById(d.speciesId);
        const st = computeDragonStats(d, zone);
        return `<button data-action="carte-pick-single" data-dragon-id="${d.id}" class="rounded-xl p-1\\.5 flex flex-col items-center" style="padding:6px;background:var(--parchment)">
          ${dragonSVG({ element: s.element, variant: s.variant, stage: d.stage, size: 48 })}
          <span class="font-body font-bold fs-9" style="color:var(--ink-soft)">V${Math.round(st.vigueur)} · É${Math.round(st.eclat)}</span>
        </button>`;
      }).join('')}</div><p class="font-body font-semibold fs-11 mt-2" style="color:var(--ink-soft)">Un dragon bien soigné et adapté au terrain part avec de meilleures chances.</p>`;
    }
    html += flowPanelHtml('Choisis un dragon', inner);
  } else if (c.view === 'team') {
    const zone = ZONES.find(z => z.id === c.zoneId);
    html += flowPanelHtml('Compose ton équipe', teamPickerHtml(zone, availableDragons));
  }

  html += `</div>`;
  document.getElementById('screen-root').innerHTML = html;
}

function renderModals() {
  const root = document.getElementById('modal-root');
  let html = '';

  if (ui.hatchFlow) html += hatchModalHtml(ui.hatchFlow);
  else if (ui.detailDragonId) {
    const dragon = state.dragons.find(d => d.id === ui.detailDragonId);
    if (dragon) html += dragonDetailModalHtml(dragon);
  } else if (ui.detailSpecies) html += speciesDetailModalHtml(ui.detailSpecies);
  else if (ui.lockChallenge) html += lockChallengeModalHtml(ui.lockChallenge);
  else if (ui.confirmResetOpen) html += confirmResetModalHtml();

  root.innerHTML = html;

  if (ui.lockChallenge) {
    wireHoldGate(() => {
      const target = ui.lockChallenge.onSuccessScreen;
      ui.lockChallenge = null;
      ui.screen = target;
      renderAll();
    });
  }
}

function hatchModalHtml(flow) {
  const revealed = flow.revealedDragon;
  const species = revealed ? speciesById(revealed.speciesId) : speciesById(flow.egg.speciesId);
  const c = ELEMENTS[species.element];

  const body = !revealed ? `
    <div style="position:relative;z-index:1" class="${flow.taps > 0 ? 'anim-shake' : ''}">${eggSVG({ element: species.element, size: 170, cracks: flow.taps })}</div>
    <p class="font-body font-extrabold fs-13 mt-3" style="position:relative;z-index:1;color:var(--ink-soft)">${flow.taps === 0 ? 'Un œuf mystérieux…' : flow.taps < flow.tapsNeeded ? 'Ça bouge…' : 'Ça y est !'}</p>
    <button data-action="hatch-tap" class="btn-primary full mt-4" style="position:relative;z-index:1;margin-top:16px;">✨ Appuie pour faire éclore (${flow.taps}/${flow.tapsNeeded})</button>
  ` : `
    <div class="relative anim-pop" style="position:relative;z-index:1">${dragonSVG({ element: species.element, variant: species.variant, stage: 'bebe', size: 170 })}</div>
    <h2 class="font-display font-extrabold text-xl mt-2" style="position:relative;z-index:1;color:var(--ink)">${escapeHtml(species.name.toUpperCase())}</h2>
    <div class="flex items-center gap-2 mt-1" style="position:relative;z-index:1">${elementChipHtml(species.element)}${rarityStarsHtml(species.variant)}</div>
    <p class="font-body fs-13 text-center mt-3 leading-relaxed rounded-2xl px-4 py-3" style="position:relative;z-index:1;color:var(--ink);background:var(--sky)">${escapeHtml(species.lore)}</p>
    <button data-action="hatch-finish" class="btn-primary full mt-4" style="position:relative;z-index:1;margin-top:16px;">Accueillir ${escapeHtml(species.name)} ✨</button>
  `;

  return `<div class="modal-overlay" role="dialog" aria-modal="true" aria-label="Éclosion"><div class="modal-sheet hatch-sheet safe-bottom-sheet">
    <div class="hatch-glow" style="background:radial-gradient(circle, ${c.light}66, transparent 70%)"></div>
    ${body}
  </div></div>`;
}

function dragonDetailModalHtml(dragon) {
  const species = speciesById(dragon.speciesId);
  const busy = !!busyDragonIds()[dragon.id];
  const cd = effectiveCooldown(dragon);
  const cooldownLeft = dragon.lastCareAt ? cd - (now - dragon.lastCareAt) : 0;
  const canCare = cooldownLeft <= 0 && !busy;
  const nextStageAt = dragon.stage === 'bebe' ? 5 : dragon.stage === 'juvenile' ? 12 : null;
  const progressPct = nextStageAt ? Math.min(100, (dragon.careCount / nextStageAt) * 100) : 100;
  const cooldownLabel = cooldownLeft >= 60000 ? `Encore ${Math.ceil(cooldownLeft / 60000)} min` : `Encore ${Math.ceil(cooldownLeft / 1000)}s`;
  const happiness = computeHappiness(dragon);
  const happinessNote = happiness >= 70 ? 'Épanoui' : happiness >= 45 ? 'Content' : 'Un peu triste — un câlin lui ferait du bien';
  const canTreat = happiness < 95 && state.ecailles >= TREAT_COST;
  const showTreatButton = happiness < 95;

  return `<div class="modal-overlay" data-backdrop-close="close-dragon-detail" role="dialog" aria-modal="true" aria-label="${escapeHtml(species.name)}"><div class="modal-sheet safe-bottom-sheet">
    <button data-action="close-dragon-detail" aria-label="Fermer" class="absolute w-8 h-8 rounded-full flex items-center justify-center" style="top:12px;right:12px;background:#F1ECE2">${icon('x', { size: 16, color: 'var(--ink-soft)' })}</button>
    ${dragonSVG({ element: species.element, variant: species.variant, stage: dragon.stage, size: 140 })}
    <h2 class="font-display font-extrabold text-xl mt-2" style="color:var(--ink)">${escapeHtml(species.name)}</h2>
    <div class="flex items-center gap-2 mt-1">${elementChipHtml(species.element)}${rarityStarsHtml(species.variant)}</div>
    <p class="font-body fs-13 text-center mt-3 leading-relaxed" style="color:var(--ink)">${escapeHtml(species.lore)}</p>
    <div class="w-full mt-3 flex justify-center gap-4 font-body font-bold fs-11" style="color:var(--ink-soft)"><span>Tempérament : ${dragon.temperament}</span></div>
    <div class="w-full mt-3">
      <div class="flex justify-between font-body font-bold fs-11 mb-1" style="color:var(--ink-soft)"><span>Bonheur</span><span>${happinessNote}</span></div>
      <div class="w-full h-2 rounded-full overflow-hidden" style="background:#EEE6D8">
        <div class="h-full rounded-full" style="width:${happiness}%;background:${happiness >= 45 ? 'var(--gold)' : '#C97A1F'}"></div>
      </div>
      ${showTreatButton ? `<button data-action="give-treat" data-dragon-id="${dragon.id}" ${canTreat ? '' : 'disabled'} class="btn-ghost full mt-2 flex items-center justify-center gap-1\\.5" style="margin-top:8px;font-size:12px;">🍬 Offrir une friandise (${TREAT_COST} écailles)</button>` : ''}
    </div>
    <div class="w-full mt-3">
      <div class="flex justify-between font-body font-bold fs-11 mb-1" style="color:var(--ink-soft)">
        <span>Stade : ${STAGE_LABEL[dragon.stage]}</span>${nextStageAt ? `<span>${dragon.careCount}/${nextStageAt} soins</span>` : ''}
      </div>
      <div class="w-full h-2 rounded-full overflow-hidden" style="background:#EEE6D8">
        <div class="h-full rounded-full" style="width:${progressPct}%;background:var(--gold)"></div>
      </div>
    </div>
    <button data-action="care-dragon" data-dragon-id="${dragon.id}" ${canCare ? '' : 'disabled'} class="btn-primary full mt-4 flex items-center justify-center gap-2" style="margin-top:16px;">
      ${icon('heart', { size: 16, color: canCare ? 'var(--ink)' : 'currentColor' })}
      ${busy ? 'En expédition' : canCare ? 'Câliner' : cooldownLabel}
    </button>
  </div></div>`;
}

let holdGateRAF = null;
let holdGateStartAt = null;
let holdGateSucceeded = false;

function wireHoldGate(onSuccess) {
  const btn = document.getElementById('hold-gate-btn');
  const ring = document.getElementById('hold-gate-progress');
  const iconSlot = document.getElementById('hold-gate-icon');
  const instructions = document.getElementById('hold-gate-instructions');
  if (!btn || !ring) return;
  holdGateSucceeded = false;

  function paint(pct) {
    ring.setAttribute('stroke-dashoffset', String(HOLD_GATE_CIRCUMFERENCE * (1 - pct)));
  }
  function tick() {
    if (holdGateStartAt === null) return;
    const elapsed = Date.now() - holdGateStartAt;
    const pct = Math.min(1, elapsed / HOLD_GATE_DURATION_MS);
    paint(pct);
    if (pct >= 1) {
      holdGateStartAt = null;
      succeed();
      return;
    }
    holdGateRAF = requestAnimationFrame(tick);
  }
  function succeed() {
    // Séquence de réussite visible avant de changer d'écran : plus rien ne se passe "en silence".
    holdGateSucceeded = true;
    btn.classList.remove('hold-gate--pressed');
    btn.classList.add('hold-gate--success');
    ring.setAttribute('stroke', '#6FA05C');
    if (iconSlot) {
      iconSlot.innerHTML = icon('check', { size: 24, color: '#436B37', className: 'hold-gate-icon--success' });
    }
    if (instructions) instructions.textContent = 'Déverrouillé !';
    haptic([20, 30, 50]);
    setTimeout(onSuccess, 550);
  }
  function start(e) {
    if (holdGateSucceeded) return;
    e.preventDefault();
    btn.classList.add('hold-gate--pressed');
    holdGateStartAt = Date.now();
    tick();
  }
  function cancel() {
    if (holdGateSucceeded) return; // ne pas effacer l'anneau juste après une réussite
    holdGateStartAt = null;
    if (holdGateRAF) cancelAnimationFrame(holdGateRAF);
    btn.classList.remove('hold-gate--pressed');
    paint(0);
  }

  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', cancel);
  btn.addEventListener('pointerleave', cancel);
  btn.addEventListener('pointercancel', cancel);
}

function effectiveCooldown(dragon) {
  const temp = TEMPERAMENT_EFFECTS[dragon.temperament] || {};
  return Math.round(CARE_COOLDOWN_MS * (temp.cooldownMult || 1));
}

function giveTreat(dragonId) {
  const d = state.dragons.find(dd => dd.id === dragonId);
  if (!d || state.ecailles < TREAT_COST) return;
  state.ecailles -= TREAT_COST;
  d.happinessBoostAt = Date.now(); // relève le bonheur sans compter comme un "soin" (ne fait pas grandir le dragon)
  saveStateDebounced();
  showToast('Friandise offerte — bonheur retrouvé ! 🍬');
  renderTopBar();
  renderModals();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
}

function careDragon(dragonId) {
  const d = state.dragons.find(dd => dd.id === dragonId);
  if (!d) return;
  if (d.lastCareAt && (Date.now() - d.lastCareAt) < effectiveCooldown(d)) return;
  const careCount = d.careCount + 1;
  const newStage = computeStage(careCount);
  const grew = newStage !== d.stage;
  d.careCount = careCount;
  d.lastCareAt = Date.now();
  d.stage = newStage;
  state.xp += 1;
  bumpDailyQuest('soin', 1);
  saveStateDebounced();
  if (grew) showToast(`${speciesById(d.speciesId).name} a grandi ! ✨`);
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
  renderModals();
}

function resolveHatch() {
  const flow = ui.hatchFlow;
  const egg = flow.egg;
  const species = speciesById(egg.speciesId);
  const newDragon = {
    id: uid('drg'), speciesId: egg.speciesId, stage: 'bebe', careCount: 0, lastCareAt: 0, happinessBoostAt: 0,
    temperament: TEMPERAMENTS[randInt(0, 3)], bornAt: Date.now(),
  };
  const discoveryList = species.legendary ? state.legendaryDiscovered : state.discovered;
  const newlyDiscovered = !discoveryList.includes(egg.speciesId);
  state.eggInbox = state.eggInbox.filter(e => e.id !== egg.id);
  state.dragons.push(newDragon);
  if (newlyDiscovered) discoveryList.push(egg.speciesId);
  state.xp += species.legendary ? 30 : 10;
  haptic(species.legendary ? [40, 60, 40, 60, 80] : newlyDiscovered ? [30, 40, 60] : 40);

  const justCompleted = !species.legendary && newlyDiscovered && state.discovered.length === SPECIES.length && !state.collectionCompleteShown;
  if (justCompleted) {
    state.collectionCompleteShown = true;
    showToast('Dragondex complet ! Le Laboratoire légendaire s\'ouvre à toi ✨🏆');
    haptic([40, 60, 40, 60, 80]);
  } else if (species.legendary && newlyDiscovered) {
    showToast(`Un dragon légendaire a éclos : ${species.name} ! 🏆✨`);
  }

  saveStateDebounced();
  ui.hatchFlow = { egg, taps: flow.taps, tapsNeeded: flow.tapsNeeded, revealedDragon: newDragon };
  renderModals();
}

/* ---- calcule les stats moyennes d'une équipe pour une zone donnée : vigueur, éclat, harmonie ----
   Ces valeurs sont maintenant réellement utilisées dans claimExpedition (elles ne servaient
   auparavant qu'à un affichage cosmétique en mode Stratège). */
function computeTeamOutcome(zoneId, dragonIds) {
  const zone = ZONES.find(z => z.id === zoneId);
  const team = dragonIds.map(id => state.dragons.find(d => d.id === id)).filter(Boolean);
  if (team.length === 0) return { avgVig: 50, avgEclat: 50, harmonie: 0 };
  const temperamentSet = {};
  team.forEach(d => { temperamentSet[d.temperament] = true; });
  const distinct = Object.keys(temperamentSet).length;
  const harmonyBonus = distinct >= 2 ? 20 : 0;
  const loyalBonus = team.reduce((sum, d) => sum + ((TEMPERAMENT_EFFECTS[d.temperament] || {}).harmonieBonus || 0), 0);
  let totalVig = 0, totalEclat = 0;
  team.forEach(d => { const st = computeDragonStats(d, zone); totalVig += st.vigueur; totalEclat += st.eclat; });
  const avgVig = Math.round(totalVig / team.length);
  const avgEclat = softCapStat(totalEclat / team.length + harmonyBonus * 0.3);
  const harmonie = team.length > 1 ? Math.min(100, 30 + harmonyBonus + loyalBonus + team.length * 10) : 50;
  return { avgVig, avgEclat, harmonie };
}

/* =========================================================================
   NOTIFICATIONS NATIVES (Capacitor uniquement — no-op silencieux ailleurs)
   Le plugin @capacitor/local-notifications n'existe que dans l'app empaquetée ;
   dans un navigateur classique ou en PWA web, ces fonctions ne font simplement rien,
   donc index.html reste utilisable tel quel comme simple page/PWA hors app native.
   ========================================================================= */
function hasNativeNotifications() {
  return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()
    && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications);
}
// Capacitor exige un id numérique ; on dérive un entier stable depuis l'id texte de l'expédition.
function notifIdForExpedition(expId) {
  let h = 0;
  for (let i = 0; i < expId.length; i++) h = (h * 31 + expId.charCodeAt(i)) >>> 0;
  return h % 2147483647;
}
async function scheduleExpeditionNotification(exp) {
  if (!hasNativeNotifications()) return;
  try {
    const { LocalNotifications } = window.Capacitor.Plugins;
    const current = await LocalNotifications.checkPermissions();
    if (current.display !== 'granted') {
      const requested = await LocalNotifications.requestPermissions();
      if (requested.display !== 'granted') return; // refusé : le jeu reste jouable, juste sans rappel
    }
    await LocalNotifications.schedule({
      notifications: [{
        id: notifIdForExpedition(exp.id),
        title: 'Lumidra',
        body: 'Ton expédition est terminée — un trésor t\u2019attend au sanctuaire ! 🐉',
        schedule: { at: new Date(exp.endAt) },
      }],
    });
  } catch (e) { /* plateforme/permission indisponible : silencieux, aucun impact sur le jeu */ }
}
async function cancelExpeditionNotification(expId) {
  if (!hasNativeNotifications()) return;
  try {
    await window.Capacitor.Plugins.LocalNotifications.cancel({ notifications: [{ id: notifIdForExpedition(expId) }] });
  } catch (e) {}
}

function startExpedition(zoneId, typeId, dragonIds) {
  const type = EXPEDITION_TYPES.find(t => t.id === typeId);
  const newExp = { id: uid('exp'), zoneId, typeId, dragonIds, startAt: Date.now(), endAt: Date.now() + type.seconds * 1000 };
  state.expeditions.push(newExp);
  scheduleExpeditionNotification(newExp);
  bumpDailyQuest('expe', 1);
  saveStateDebounced();
  showToast('Expédition lancée !');
  ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
  if (ui.screen === 'carte') renderScreenCarte();
}

function claimExpedition(expId) {
  const exp = state.expeditions.find(e => e.id === expId);
  if (!exp || exp.endAt > Date.now()) return;
  const type = EXPEDITION_TYPES.find(t => t.id === exp.typeId);
  const zone = ZONES.find(z => z.id === exp.zoneId);

  // La Vigueur et l'Éclat de l'équipe (calculés à partir des dragons réellement envoyés)
  // modulent maintenant le gain et la chance d'œuf — ce n'est plus un simple tirage aveugle.
  const { avgVig, avgEclat, harmonie } = computeTeamOutcome(exp.zoneId, exp.dragonIds);
  const rewardMultiplier = 0.8 + (avgVig / 100) * 0.5;   // 0.8x à 1.3x selon la vigueur de l'équipe
  const eggChanceBonus = (avgEclat / 100) * 0.25 + (harmonie / 100) * 0.1; // jusqu'à +35% de chance d'œuf
  const bonusPct = Math.round((rewardMultiplier - 1) * 100); // affiché au joueur : -20 à +30

  let ecaillesGain = Math.round(randInt(type.ecaillesMin, type.ecaillesMax) * rewardMultiplier);
  let gotEgg = null;
  let gotLegendary = false;

  // Chance de dragon légendaire : uniquement en expédition majeure, une fois le Dragondex commun complet
  const legendaryEligible = type.id === 'majeure' && state.discovered.length >= SPECIES.length
    && state.legendaryDiscovered.length < LEGENDARY_SPECIES.length;
  if (legendaryEligible && Math.random() < 0.08 + (avgEclat / 100) * 0.07) {
    const undiscoveredLegendary = LEGENDARY_SPECIES.filter(s => !state.legendaryDiscovered.includes(s.id));
    const picked = undiscoveredLegendary[randInt(0, undiscoveredLegendary.length - 1)];
    gotEgg = { id: uid('egg'), speciesId: picked.id, obtainedAt: Date.now() };
    gotLegendary = true;
  } else if (Math.random() < Math.min(0.95, type.eggChance + eggChanceBonus)) {
    const picked = weightedSpeciesFromZone(zone);
    if (!state.discovered.includes(picked.id)) gotEgg = { id: uid('egg'), speciesId: picked.id, obtainedAt: Date.now() };
    else ecaillesGain += 40;
  }

  state.ecailles += ecaillesGain;
  state.xp += 5;
  bumpDailyQuest('ecaille', ecaillesGain);
  if (gotEgg) state.eggInbox.push(gotEgg);
  state.expeditions = state.expeditions.filter(e => e.id !== expId);
  saveStateDebounced();
  haptic(gotLegendary ? [40, 60, 40, 60, 80] : gotEgg ? [25, 50, 50] : 30);
  const bonusLabel = bonusPct > 0 ? ` (équipe : +${bonusPct}%)` : bonusPct < 0 ? ` (équipe : ${bonusPct}%)` : '';
  showToast(gotLegendary ? `+${ecaillesGain} écailles${bonusLabel} et un œuf légendaire ! 🏆` : gotEgg ? `+${ecaillesGain} écailles${bonusLabel} et un nouvel œuf !` : `+${ecaillesGain} écailles${bonusLabel}`);
  renderTopBar();
  if (ui.screen === 'carte') renderScreenCarte();
}

function buyDecor(decorId) {
  const decor = DECOR.find(d => d.id === decorId);
  if (!decor || state.decorOwned.includes(decorId) || state.ecailles < decor.cost) return;
  state.ecailles -= decor.cost;
  state.decorOwned.push(decorId);
  saveStateDebounced();
  showToast(`${decor.name} ajouté !`);
  renderTopBar();
  renderScreenBoutique();
}

function toggleEquipDecor(decorId) {
  const equipped = state.decorEquipped.includes(decorId);
  if (!equipped && state.decorEquipped.length >= 3) { showToast('Maximum 3 décorations affichées'); return; }
  state.decorEquipped = equipped ? state.decorEquipped.filter(id => id !== decorId) : [...state.decorEquipped, decorId];
  saveStateDebounced();
  renderScreenBoutique();
}

function doReset() {
  state.expeditions.forEach(exp => cancelExpeditionNotification(exp.id));
  state = freshDefaultState();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  ui.screen = 'sanctuaire';
  ui.confirmResetOpen = false;
  ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
  renderAll();
}

function dispatchAction(action, dataset, evt, el) {
  const dragonId = dataset.dragonId;
  const speciesId = dataset.speciesId;
  const zoneId = dataset.zoneId;
  const typeId = dataset.typeId;
  const decorId = dataset.decorId;
  const mode = dataset.mode;
  const elementKey = dataset.element;
  const screenName = dataset.screen;
  const expId = dataset.expId;
  const questId = dataset.questId;

  switch (action) {
    case 'select-mode':
      ui.onboarding.mode = mode;
      renderOnboarding();
      break;
    case 'complete-onboarding':
      completeOnboarding();
      break;
    case 'open-settings':
      requestScreen('reglages');
      break;
    case 'nav':
      requestScreen(screenName);
      break;
    case 'open-dragon':
      ui.detailDragonId = dragonId;
      renderModals();
      break;
    case 'close-dragon-detail':
      ui.detailDragonId = null;
      renderModals();
      break;
    case 'care-dragon':
      careDragon(dragonId);
      break;
    case 'start-hatch-from-inbox':
      if (state.eggInbox.length > 0) {
        const firstEgg = state.eggInbox[0];
        ui.hatchFlow = { egg: firstEgg, taps: 0, tapsNeeded: requiredHatchTaps(speciesById(firstEgg.speciesId)), revealedDragon: null };
        renderModals();
      }
      break;
    case 'hatch-tap': {
      const needed = ui.hatchFlow.tapsNeeded || 3;
      ui.hatchFlow.taps = Math.min(needed, ui.hatchFlow.taps + 1);
      if (ui.hatchFlow.taps >= needed && !ui.hatchFlow.revealedDragon) resolveHatch();
      else renderModals();
      break;
    }
    case 'hatch-finish':
      ui.hatchFlow = null;
      renderAll();
      break;
    case 'open-species': {
      const sp = speciesById(speciesId);
      ui.detailSpecies = { species: sp, discovered: state.discovered.includes(speciesId) };
      renderModals();
      break;
    }
    case 'close-species-detail':
      ui.detailSpecies = null;
      renderModals();
      break;
    case 'dragondex-filter':
      ui.dragondexFilter = elementKey;
      renderScreenDragondex();
      break;
    case 'carte-open-zone': {
      const zone = ZONES.find(z => z.id === zoneId);
      if (computeLevel(state.xp) < zone.unlockLevel) {
        showToast(`Niveau ${zone.unlockLevel} requis pour débloquer cette zone`);
        if (el) { el.classList.remove('anim-shake'); void el.offsetWidth; el.classList.add('anim-shake'); }
        break;
      }
      ui.carte = { view: 'types', zoneId: zoneId, typeId: null, teamIds: [] };
      renderScreenCarte();
      break;
    }
    case 'carte-back': {
      if (ui.carte.view === 'types') ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
      else ui.carte.view = 'types';
      renderScreenCarte();
      break;
    }
    case 'carte-choose-type': {
      const type = EXPEDITION_TYPES.find(t => t.id === typeId);
      ui.carte.typeId = typeId;
      ui.carte.teamIds = [];
      ui.carte.view = (type.team && state.mode === 'stratege') ? 'team' : 'pick1';
      renderScreenCarte();
      break;
    }
    case 'carte-pick-single':
      startExpedition(ui.carte.zoneId, ui.carte.typeId, [dragonId]);
      break;
    case 'carte-toggle-team-member': {
      const ids = ui.carte.teamIds;
      if (ids.includes(dragonId)) ui.carte.teamIds = ids.filter(x => x !== dragonId);
      else if (ids.length < 3) ui.carte.teamIds = [...ids, dragonId];
      renderScreenCarte();
      break;
    }
    case 'carte-confirm-team':
      if (ui.carte.teamIds.length >= 2) startExpedition(ui.carte.zoneId, ui.carte.typeId, ui.carte.teamIds);
      break;
    case 'carte-claim':
      claimExpedition(expId);
      break;
    case 'buy-decor':
      buyDecor(decorId);
      break;
    case 'toggle-equip-decor':
      toggleEquipDecor(decorId);
      break;
    case 'toggle-parental-lock':
      state.parentalLock = !state.parentalLock;
      saveStateDebounced();
      renderScreenReglages();
      break;
    case 'change-mode':
      state.mode = mode;
      saveStateDebounced();
      renderTopBar();
      renderScreenReglages();
      break;
    case 'save-name': {
      const input = document.getElementById('reglages-name-input');
      const val = input ? input.value.trim() : '';
      if (val) state.gardienName = val;
      saveStateDebounced();
      renderTopBar();
      showToast('Nom mis à jour');
      break;
    }
    case 'request-reset':
      ui.confirmResetOpen = true;
      renderModals();
      break;
    case 'cancel-reset':
      ui.confirmResetOpen = false;
      renderModals();
      break;
    case 'confirm-reset':
      doReset();
      break;
    case 'close-lock-challenge':
      ui.lockChallenge = null;
      renderModals();
      break;
    case 'claim-daily-quest':
      claimDailyQuest(questId);
      break;
    case 'give-treat':
      giveTreat(dragonId);
      break;
  }
}

function initEvents() {
  const app = document.getElementById('lumidra-app');

  app.addEventListener('click', (e) => {
    // 1) Clic direct sur le fond (backdrop) d'une modale → fermeture.
    //    On vérifie que la cible EST l'overlay lui-même (pas un descendant),
    //    sinon un clic sur du texte à l'intérieur de la feuille fermerait la modale par erreur.
    if (e.target.classList && e.target.classList.contains('modal-overlay')) {
      const closeAction = e.target.dataset.backdropClose;
      if (closeAction) dispatchAction(closeAction, e.target.dataset, e, e.target);
      return;
    }
    // 2) Recherche normale d'un élément actionnable
    const el = e.target.closest('[data-action]');
    if (!el || el.disabled) return;
    dispatchAction(el.dataset.action, el.dataset, e, el);
  });

  // saisie texte : mise à jour silencieuse (pas de re-rendu, on garde le focus)
  app.addEventListener('input', (e) => {
    const bind = e.target.dataset ? e.target.dataset.bind : null;
    if (bind === 'onboarding-name') ui.onboarding.name = e.target.value;
  });

  app.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const bind = e.target.dataset ? e.target.dataset.bind : null;
      if (bind === 'reglages-name') document.querySelector('[data-action="save-name"]').click();
      if (e.target.id === 'onboarding-name-input') document.querySelector('[data-action="complete-onboarding"]').click();
    }
  });
}

/* =========================================================================
   DÉMARRAGE
   ========================================================================= */

function bootLumidra() {
  loadState();
  if (state.onboarded) ensureDailyQuests();
  state.expeditions.forEach(exp => { if (exp.endAt > Date.now()) scheduleExpeditionNotification(exp); });
  initEvents();
  renderAll();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootLumidra);
} else {
  bootLumidra();
}

</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
