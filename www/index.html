<style>
/* =========================================================================
   LUMIDRA — feuille de style statique (remplace Tailwind, aucune dépendance)
   Échelle d'espacement identique à l'échelle par défaut de Tailwind (0.25rem/unité)
   ========================================================================= */

@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:500; font-display:swap; src:url('fonts/baloo-2-latin-500-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:600; font-display:swap; src:url('fonts/baloo-2-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/baloo-2-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family:'Baloo 2'; font-style:normal; font-weight:800; font-display:swap; src:url('fonts/baloo-2-latin-800-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:400; font-display:swap; src:url('fonts/nunito-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:600; font-display:swap; src:url('fonts/nunito-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:700; font-display:swap; src:url('fonts/nunito-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family:'Nunito'; font-style:normal; font-weight:800; font-display:swap; src:url('fonts/nunito-latin-800-normal.woff2') format('woff2'); }

:root {
  --ink:#3A2E2A; --ink-soft:#806B5E; --sky:#F3F6FB; --parchment:#FFFCF6;
  --gold:#EDA23C; --gold-deep:#C97A1F; --gold-deep-btn:#D5862B;
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  background: var(--sky);
  font-family: 'Nunito', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button, input { font: inherit; color: inherit; }
button { cursor:pointer; background:none; border:none; padding:0; text-align:inherit; }
img, svg { display:block; }

/* ---- iOS Safari : zone tactile propre, pas de zoom ni sélection parasites ---- */
.lumidra-root {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
.lumidra-root input {
  -webkit-user-select: text;
  user-select: text;
}
/* Toute saisie doit rester ≥16px : sous ce seuil, iOS Safari force un zoom automatique au focus. */
.lumidra-root input[type="text"],
.lumidra-root input:not([type]) {
  font-size: 16px !important;
}

.font-display { font-family: 'Baloo 2', system-ui, sans-serif; }
.font-body { font-family: 'Nunito', system-ui, sans-serif; }

/* ---- typographie ---- */
.text-xs   { font-size:.75rem; line-height:1rem; }
.text-sm   { font-size:.875rem; line-height:1.25rem; }
.text-base { font-size:1rem; line-height:1.5rem; }
.text-lg   { font-size:1.125rem; line-height:1.75rem; }
.text-xl   { font-size:1.25rem; line-height:1.75rem; }
.text-2xl  { font-size:1.5rem; line-height:2rem; }
.text-3xl  { font-size:1.875rem; line-height:2.25rem; }
.fs-8  { font-size:8px; }
.fs-9  { font-size:9px; }
.fs-10 { font-size:10px; }
.fs-11 { font-size:11px; }
.fs-13 { font-size:13px; }
.font-semibold { font-weight:600; }
.font-bold      { font-weight:700; }
.font-extrabold { font-weight:800; }
.text-center { text-align:center; }
.text-left   { text-align:left; }
.text-white  { color:#fff; }
.leading-tight    { line-height:1.2; }
.leading-relaxed  { line-height:1.6; }
.whitespace-nowrap{ white-space:nowrap; }

/* ---- layout ---- */
.flex        { display:flex; }
.inline-flex { display:inline-flex; }
.grid        { display:grid; }
.block       { display:block; }
.flex-col    { flex-direction:column; }
.flex-1      { flex:1 1 0%; }
.shrink-0    { flex-shrink:0; }
.items-center{ align-items:center; }
.justify-center { justify-content:center; }
.justify-between{ justify-content:space-between; }
.justify-around { justify-content:space-around; }
.grid-cols-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
.grid-cols-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
.grid-cols-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
.-space-x-2 > * + * { margin-left:-8px; }
.relative { position:relative; }
.absolute { position:absolute; }
.inset-0  { top:0; right:0; bottom:0; left:0; }
.top-0\.5 { top:2px; } .top-1\.5 { top:6px; } .top-3 { top:12px; }
.right-1\.5{ right:6px; } .right-3 { right:12px; } .right-4 { right:16px; }
.left-4   { left:16px; }
.z-50     { z-index:50; }
.overflow-hidden { overflow:hidden; }
.overflow-x-auto { overflow-x:auto; }
.overflow-y-auto { overflow-y:auto; }
.pointer-events-none { pointer-events:none; }
.mx-auto  { margin-left:auto; margin-right:auto; }

/* ---- espacements (échelle Tailwind : n × 4px) ---- */
.gap-0\.5{gap:2px;} .gap-1{gap:4px;} .gap-1\.5{gap:6px;} .gap-2{gap:8px;}
.gap-2\.5{gap:10px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
.p-1\.5{padding:6px;} .p-2{padding:8px;} .p-2\.5{padding:10px;} .p-3{padding:12px;}
.p-3\.5{padding:14px;} .p-4{padding:16px;}
.px-1\.5{padding-left:6px;padding-right:6px;} .px-2{padding-left:8px;padding-right:8px;}
.px-2\.5{padding-left:10px;padding-right:10px;} .px-3{padding-left:12px;padding-right:12px;}
.px-3\.5{padding-left:14px;padding-right:14px;} .px-4{padding-left:16px;padding-right:16px;}
.px-6{padding-left:24px;padding-right:24px;}
.py-0\.5{padding-top:2px;padding-bottom:2px;} .py-1\.5{padding-top:6px;padding-bottom:6px;}
.py-2{padding-top:8px;padding-bottom:8px;} .py-2\.5{padding-top:10px;padding-bottom:10px;}
.py-3{padding-top:12px;padding-bottom:12px;} .py-8{padding-top:32px;padding-bottom:32px;}
.pt-2{padding-top:8px;} .pt-4{padding-top:16px;}
.pb-1{padding-bottom:4px;} .pb-2{padding-bottom:8px;} .pb-4{padding-bottom:16px;} .pb-5{padding-bottom:20px;}
.mt-1{margin-top:4px;} .mt-1\.5{margin-top:6px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;}
.mb-1{margin-bottom:4px;} .mb-1\.5{margin-bottom:6px;} .mb-2{margin-bottom:8px;} .mb-2\.5{margin-bottom:10px;}
.mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;} .mb-6{margin-bottom:24px;}
.ml-0\.5{margin-left:2px;}

/* ---- tailles ---- */
.w-1\.5{width:6px;} .h-1\.5{height:6px;} .h-2{height:8px;}
.w-5{width:20px;} .h-5{height:20px;} .h-6{height:24px;}
.w-8{width:32px;} .h-8{height:32px;} .w-9{width:36px;} .h-9{height:36px;}
.w-10{width:40px;} .h-10{height:40px;} .w-11{width:44px;} .w-24{width:96px;}
.w-full{width:100%;} .h-full{height:100%;}

/* ---- forme / couleur / ombre ---- */
.rounded-xl  { border-radius:12px; }
.rounded-2xl { border-radius:16px; }
.rounded-3xl { border-radius:24px; }
.rounded-full{ border-radius:9999px; }
.bg-white { background:#fff; }
.shadow-sm{ box-shadow:0 1px 3px rgba(0,0,0,.08); }
.shadow-lg{ box-shadow:0 6px 16px rgba(0,0,0,.18); }

/* =========================================================================
   COMPOSANTS ET MOTIFS RÉPÉTÉS
   ========================================================================= */

.lumidra-root { -webkit-tap-highlight-color: transparent; }
.lumidra-root * { box-sizing:border-box; }

.btn-primary {
  font-family:'Baloo 2'; font-weight:700; color:var(--ink);
  background:linear-gradient(135deg,var(--gold),var(--gold-deep-btn));
  padding:13px; border-radius:16px; font-size:14px;
  box-shadow:0 3px 10px rgba(201,122,31,0.25);
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:auto;
  transition: transform .08s ease, filter .08s ease;
}
.btn-primary.full { width:100%; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary:active:not(:disabled) { transform:scale(0.97); filter:brightness(0.96); }
.btn-ghost {
  font-family:'Baloo 2'; font-weight:700; padding:13px; border-radius:16px;
  font-size:14px; background:#F1ECE2; color:var(--ink);
  transition: transform .08s ease;
}
.btn-ghost:active { transform:scale(0.97); }

/* ---- retour tactile générique : tout élément actionnable réagit visiblement au tap ---- */
[data-action] { transition: transform .08s ease, filter .08s ease, opacity .08s ease; }
[data-action]:active:not(:disabled) { transform:scale(0.96); filter:brightness(0.97); }
button:disabled { cursor:not-allowed; }

/* ---- zones de sécurité iOS (encoche, Dynamic Island, barre gestuelle) ---- */
.safe-top    { padding-top: max(16px, env(safe-area-inset-top)); }
.safe-bottom { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.safe-bottom-sheet { padding-bottom: max(26px, env(safe-area-inset-bottom)); }

.modal-overlay {
  position:absolute; inset:0; background:rgba(58,46,42,0.45);
  display:flex; align-items:flex-end; justify-content:center; z-index:50;
}
.modal-sheet {
  background:var(--parchment); border-radius:28px 28px 0 0; padding:26px 22px;
  width:100%; display:flex; flex-direction:column; align-items:center;
  position:relative; max-height:82%; overflow-y:auto;
}
.hatch-sheet { padding-top:34px; align-items:center; text-align:center; }
.hatch-glow {
  position:absolute; top:6px; left:50%; transform:translateX(-50%);
  width:260px; height:260px; border-radius:50%; pointer-events:none;
}

/* ---- verrou parental par appui long ---- */
.hold-gate {
  position:relative; width:80px; height:80px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--parchment); -webkit-user-select:none; user-select:none;
  transition: transform .12s ease, background .15s ease;
}
.hold-gate-ring { position:absolute; inset:0; }
#hold-gate-progress { transition: stroke-dashoffset .05s linear, stroke .2s ease; }
.hold-gate-icon { position:relative; z-index:1; pointer-events:none; display:flex; }
.hold-gate:active { filter:brightness(0.97); }
.hold-gate--pressed { transform:scale(0.94); background:#FFF3DC; }
.hold-gate--success { transform:scale(1.08); background:#FFF3DC; }
@keyframes lumidra-check-pop { 0%{transform:scale(0.4);opacity:0;} 60%{transform:scale(1.15);opacity:1;} 100%{transform:scale(1);opacity:1;} }
.hold-gate-icon--success { animation: lumidra-check-pop .35s cubic-bezier(.25,.9,.3,1.3); }

input[type="text"], input[type="tel"] {
  border:none; outline:none;
}
input:focus { outline:2px solid var(--gold); }
button:focus-visible { outline:2px solid var(--gold-deep); outline-offset:2px; }

/* ---- animations ---- */
@keyframes lumidra-pop   { 0%{transform:scale(.5);opacity:0;} 60%{transform:scale(1.08);opacity:1;} 100%{transform:scale(1);opacity:1;} }
@keyframes lumidra-pulse { 0%,100%{opacity:.7;transform:scale(1);} 50%{opacity:1;transform:scale(1.06);} }
@keyframes lumidra-float { 0%{transform:translateY(0) scale(.6);opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-40px) scale(1);opacity:0;} }
@keyframes lumidra-fadeup{ 0%{opacity:0;transform:translateY(8px);} 100%{opacity:1;transform:translateY(0);} }
@keyframes lumidra-shake { 0%,100%{transform:translateX(0) rotate(0);} 25%{transform:translateX(-3px) rotate(-2.5deg);} 75%{transform:translateX(3px) rotate(2.5deg);} }
.anim-pop    { animation: lumidra-pop .5s cubic-bezier(.25,.9,.3,1.2); }
.anim-pulse  { animation: lumidra-pulse 2.2s ease-in-out infinite; }
.anim-float  { animation: lumidra-float 1.4s ease-out forwards; }
.anim-fadeup { animation: lumidra-fadeup .35s ease both; }
.anim-shake  { animation: lumidra-shake .3s ease; }

@keyframes lumidra-idle-bob      {
  0%, 100% { transform: translateY(0) scale(1,1); }
  12%      { transform: translateY(1px) scale(1.06,0.92); }
  38%      { transform: translateY(-13px) scale(0.95,1.07); }
  62%      { transform: translateY(0) scale(1.07,0.9); }
  78%      { transform: translateY(0) scale(1,1); }
}
@keyframes lumidra-legendary-glow{ 0%,100%{opacity:.28;transform:scale(1);} 50%{opacity:.55;transform:scale(1.1);} }
@keyframes lumidra-wing-flap     { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(-16deg);} }
@keyframes lumidra-eye-blink     { 0%,90%,100%{transform:scaleY(1);} 95%{transform:scaleY(0.12);} }
@keyframes lumidra-tail-swish    { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(9deg);} }
.dragon-anim-idle           { animation: lumidra-idle-bob 3.4s cubic-bezier(.34,1.56,.64,1) infinite; transform-origin:50% 100%; }
.dragon-anim-legendary-halo { animation: lumidra-legendary-glow 2.4s ease-in-out infinite; transform-origin:center; }
.dragon-wing-flap           { animation: lumidra-wing-flap 1.7s ease-in-out infinite; transform-origin:0 0; }
.dragon-eye-blink           { animation: lumidra-eye-blink 5.5s ease-in-out infinite; transform-origin:100px 70px; }
.dragon-tail-swish          { animation: lumidra-tail-swish 3.4s ease-in-out infinite; transform-origin:126px 150px; }

@media (prefers-reduced-motion: reduce) {
  .anim-pop,.anim-pulse,.anim-float,.anim-fadeup,.anim-shake,.dragon-anim-idle,.dragon-anim-legendary-halo,
  .dragon-wing-flap,.dragon-eye-blink,.dragon-tail-swish { animation:none !important; }
}

/* Réglage "Animations douces" (indépendant du prefers-reduced-motion système) :
   garde un peu de vie sans le rebond marqué façon squash-stretch. */
body.gentle-fx .dragon-anim-idle { animation-name: lumidra-idle-bob-soft; animation-duration: 3.2s; animation-timing-function: ease-in-out; }
body.gentle-fx .dragon-wing-flap { animation-duration: 2.8s; }
body.gentle-fx .dragon-tail-swish { animation-duration: 4.4s; }
@keyframes lumidra-idle-bob-soft { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }

/* ---- accessibilité clavier / états ---- */
[data-action]:focus-visible { outline:2px solid var(--gold-deep); outline-offset:2px; border-radius:8px; }

body { display:flex; justify-content:center; align-items:flex-start; min-height:100vh; min-height:100dvh; }
#lumidra-app { width:100%; max-width:430px; height:100vh; height:100dvh; max-height:900px; background:var(--sky); position:relative; overflow:hidden; display:flex; flex-direction:column; }
#main-shell { display:flex; flex-direction:column; height:100%; min-height:0; }
@media (min-width:431px) {
  body { background:#e2e5ea; padding:24px 0; }
  #lumidra-app { border-radius:28px; box-shadow:0 12px 40px rgba(0,0,0,.18); height:844px; }
}
</style>

/* ---- utilitaires purs ---- */

function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
const SPECIES_BY_ID = new Map(SPECIES.map(s => [s.id, s]));
function speciesById(id) { return SPECIES_BY_ID.get(id); }
function dragonDisplayName(dragon, species) { return (dragon.customName && dragon.customName.trim()) || species.name; }
function computeStage(careCount) { return careCount >= 12 ? 'adulte' : careCount >= 5 ? 'juvenile' : 'bebe'; }
function computeLevel(xp) { return Math.floor(xp / 60) + 1; }
function xpIntoLevel(xp) { return xp % 60; }

// Centralise tous les gains d'XP pour détecter une montée de niveau et la célébrer
// (toast + son + vibration), plutôt que de dupliquer cette détection à chaque appel.
function addXp(amount) {
  const before = computeLevel(state.xp);
  state.xp += amount;
  const after = computeLevel(state.xp);
  if (after > before) {
    setTimeout(() => {
      showToast(`🎉 Niveau ${after} atteint !`);
      playAchievementSound();
      haptic([30, 50, 30, 50, 80]);
    }, 350);
  }
}
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function fmtCountdown(ms) {
  if (ms <= 0) return '00:00';
  const s = Math.ceil(ms / 1000);
  if (s >= 3600) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${h}h ${String(m).padStart(2, '0')}min`;
  }
  const m = Math.floor(s / 60);
  const r = s % 60;
  return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
}

function weightedSpeciesFromZone(zone, legendaryChance) {
  if (legendaryChance) {
    const legendaryPool = SPECIES.filter(s => s.variant === 4 && zone.elements.includes(s.element));
    if (legendaryPool.length && Math.random() < legendaryChance) {
      return legendaryPool[randInt(0, legendaryPool.length - 1)];
    }
  }
  const pool = SPECIES.filter(s => zone.elements.includes(s.element) && s.variant < 4);
  const weighted = [];
  pool.forEach(s => { const w = s.variant <= 1 ? 5 : s.variant === 2 ? 2 : 1; for (let i = 0; i < w; i++) weighted.push(s); });
  return weighted[randInt(0, weighted.length - 1)];
}

function computeDragonStats(dragon, zone) {
  const s = speciesById(dragon.speciesId);
  const rarityBase = [30, 30, 45, 60, 85][s.variant];
  const stageBonus = { bebe: 0, juvenile: 8, adulte: 16 }[dragon.stage];
  const vigueur = rarityBase + stageBonus;
  const eclat = rarityBase + stageBonus + (zone.elements.includes(s.element) ? 20 : 0);
  return { vigueur, eclat };
}

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function polarPoint(cx, cy, r, angleDeg) {
  const a = (angleDeg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}

function starPath(cx, cy, rOuter, rInner, points) {
  let d = '';
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? rOuter : rInner;
    const [x, y] = polarPoint(cx, cy, r, (360 / (points * 2)) * i);
    d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
  }
  return d + 'Z';
}

function sunRays(cx, cy, rInner, rOuter, count) {
  let out = '';
  for (let i = 0; i < count; i++) {
    const [x1, y1] = polarPoint(cx, cy, rInner, (360 / count) * i);
    const [x2, y2] = polarPoint(cx, cy, rOuter, (360 / count) * i);
    out += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"/>`;
  }
  return out;
}

function gearTeeth(cx, cy, rInner, rOuter, count, toothWidthDeg) {
  let out = '';
  for (let i = 0; i < count; i++) {
    const mid = (360 / count) * i;
    const a1 = mid - toothWidthDeg / 2, a2 = mid + toothWidthDeg / 2;
    const [ix1, iy1] = polarPoint(cx, cy, rInner, a1);
    const [ox1, oy1] = polarPoint(cx, cy, rOuter, a1);
    const [ox2, oy2] = polarPoint(cx, cy, rOuter, a2);
    const [ix2, iy2] = polarPoint(cx, cy, rInner, a2);
    out += `<path d="M${ix1.toFixed(2)},${iy1.toFixed(2)} L${ox1.toFixed(2)},${oy1.toFixed(2)} L${ox2.toFixed(2)},${oy2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)}"/>`;
  }
  return out;
}

let __svgUidCounter = 0;
function nextSvgUid() { return 'u' + (__svgUidCounter++); }

function teardropPath(cx, cy, scale, rotation) {
  return `<path transform="translate(${cx},${cy}) rotate(${rotation}) scale(${scale})" d="M0,-10 C6,-4 6,4 0,10 C-6,4 -6,-4 0,-10 Z"`;
}

function elementAccentsSVG(element, variant, tailX, tailY, headX, headY) {
  const c = ELEMENTS[element];
  const tailScale = [0.8, 1.0, 1.15, 1.3, 1.4][variant];
  const headScale = [0, 0, 0.7, 0.9, 1.0][variant];
  let out = '';

  if (element === 'feu') {
    out += `${teardropPath(tailX, tailY, tailScale, 0)} fill="${c.base}" stroke="${c.deep}" stroke-width="${1.1 * tailScale}"/>`;
    if (headScale) out += `${teardropPath(headX, headY, headScale, 0)} fill="${c.light}" stroke="${c.base}" stroke-width="${1.1 * headScale}"/>`;
  } else if (element === 'eau') {
    out += `${teardropPath(tailX, tailY, tailScale, 180)} fill="${c.base}" opacity="0.9" stroke="${c.deep}" stroke-width="${1.1 * tailScale}"/>`;
    if (headScale) out += `${teardropPath(headX, headY, headScale, 180)} fill="${c.light}" opacity="0.9" stroke="${c.base}" stroke-width="${1.1 * headScale}"/>`;
  } else if (element === 'terre') {
    out += `<path transform="translate(${tailX},${tailY}) scale(${tailScale})" d="M-8,6 L-4,-7 L6,-8 L9,4 L2,9 Z" fill="${c.deep}"/>`;
    if (headScale) out += `<path transform="translate(${headX},${headY}) scale(${headScale})" d="M-8,6 L-4,-7 L6,-8 L9,4 L2,9 Z" fill="${c.base}"/>`;
  } else if (element === 'air') {
    const cloud = (cx, cy, s) => `<g transform="translate(${cx},${cy}) scale(${s})" opacity="0.85"><circle cx="-6" cy="2" r="5" fill="${c.light}"/><circle cx="0" cy="-3" r="6" fill="${c.light}"/><circle cx="6" cy="2" r="5" fill="${c.light}"/></g>`;
    out += cloud(tailX, tailY, tailScale);
    out += cloud((tailX + headX) / 2, (tailY + headY) / 2 + 10, tailScale * 0.7);
    if (headScale) out += cloud(headX, headY, headScale);
  } else if (element === 'lumiere') {
    const star = (cx, cy, s, fill) => `<path transform="translate(${cx},${cy}) scale(${s})" d="M0,-9 L2.5,-2.5 L9,0 L2.5,2.5 L0,9 L-2.5,2.5 L-9,0 L-2.5,-2.5 Z" fill="${fill}"/>`;
    out += star(tailX, tailY, tailScale, c.base);
    out += star(headX - 14, headY - 6, Math.max(0.6, headScale), c.base);
    out += star(headX + 16, headY + 4, Math.max(0.5, headScale * 0.8), c.light);
  } else { // nature
    const leaf = (cx, cy, s, rot) => `<g transform="translate(${cx},${cy}) rotate(${rot}) scale(${s})"><path d="M0,-10 C6,-4 6,4 0,10 C-6,4 -6,-4 0,-10 Z" fill="${c.base}"/><line x1="0" y1="-7" x2="0" y2="7" stroke="${c.deep}" stroke-width="1.1" stroke-linecap="round"/></g>`;
    out += leaf(tailX, tailY, tailScale, -20);
    if (headScale) {
      out += leaf(headX, headY, headScale, 15);
      if (variant >= 3) {
        let petals = '';
        for (let i = 0; i < 5; i++) {
          const a = (i * 72 - 90) * Math.PI / 180;
          petals += `<circle cx="${(Math.cos(a) * 6).toFixed(2)}" cy="${(Math.sin(a) * 6).toFixed(2)}" r="4" fill="${c.light}"/>`;
        }
        out += `<g transform="translate(${headX + 18},${headY - 4}) scale(0.9)">${petals}<circle cx="0" cy="0" r="3" fill="${c.deep}"/></g>`;
      }
    }
  }
  return out;
}

let audioCtx = null;
function getAudioCtx() {
  if (!state.soundEnabled) return null;
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
  return audioCtx;
}

function playTone(freq, duration, opts) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  opts = opts || {};
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.value = freq;
    const now = ctx.currentTime;
    const vol = opts.volume != null ? opts.volume : 0.1;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.03);
  } catch (e) { /* audio indisponible : silencieux */ }
}

function playCareSound() { playTone(520, 0.12, { type: 'sine', volume: 0.09 }); }
function playCoinSound() {
  playTone(880, 0.09, { type: 'triangle', volume: 0.08 });
  setTimeout(() => playTone(1180, 0.1, { type: 'triangle', volume: 0.07 }), 70);
}
function playHatchSound() {
  [660, 880, 1180, 1480].forEach((f, i) => setTimeout(() => playTone(f, 0.16, { type: 'sine', volume: 0.1 }), i * 90));
}
function playAchievementSound() {
  [520, 660, 880].forEach((f, i) => setTimeout(() => playTone(f, 0.18, { type: 'triangle', volume: 0.09 }), i * 100));
}

function todayDateStr() { return new Date().toISOString().slice(0, 10); }
function weekKeyStr() { return `w${Math.floor(Date.now() / 86400000 / 7)}`; }

function ensureDailyQuests() {
  if (state.dailyQuests && state.dailyQuests.date === todayDateStr()) return;
  const pool = QUEST_POOL.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    const tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  const picked = pool.slice(0, 3).map(q => ({ id: q.type, type: q.type, desc: q.desc, target: q.target, reward: q.reward, progress: 0, claimed: false }));
  state.dailyQuests = { date: todayDateStr(), quests: picked };
  saveStateDebounced();
}

function ensureWeeklyChallenge() {
  const wk = weekKeyStr();
  if (state.weeklyChallenge && state.weeklyChallenge.weekKey === wk) return;
  const pick = WEEKLY_POOL[randInt(0, WEEKLY_POOL.length - 1)];
  state.weeklyChallenge = { weekKey: wk, type: pick.type, desc: pick.desc, target: pick.target, reward: pick.reward, progress: 0, claimed: false };
  saveStateDebounced();
}

function claimWeeklyChallenge() {
  const w = state.weeklyChallenge;
  if (!w || w.claimed || w.progress < w.target) return;
  w.claimed = true;
  state.ecailles += w.reward;
  saveStateDebounced();
  showToast(`Défi hebdomadaire réussi ! +${w.reward} écailles`);
  haptic([30, 40, 60]);
  playAchievementSound();
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
}

// Bonus de connexion quotidienne : compte les jours consécutifs et récompense en écailles.
// Retourne { streak, bonus } le jour où un nouveau bonus est accordé, sinon null.
function checkLoginStreak() {
  const today = todayDateStr();
  if (state.lastLoginDate === today) return null;
  if (state.lastLoginDate) {
    const prevDate = new Date(state.lastLoginDate + 'T00:00:00Z');
    const todayDate = new Date(today + 'T00:00:00Z');
    const diffDays = Math.round((todayDate - prevDate) / 86400000);
    state.loginStreak = diffDays === 1 ? (state.loginStreak || 0) + 1 : 1;
  } else {
    state.loginStreak = 1;
  }
  state.longestStreak = Math.max(state.longestStreak || 0, state.loginStreak);
  const bonus = 10 + Math.min(state.loginStreak, 10) * 2;
  state.ecailles += bonus;
  state.lastLoginDate = today;
  saveStateDebounced();
  return { streak: state.loginStreak, bonus };
}

function bumpQuestProgress(type, amount) {
  let changed = false;
  if (state.dailyQuests) {
    const q = state.dailyQuests.quests.find(qq => qq.type === type && !qq.claimed);
    if (q) { q.progress = Math.min(q.target, q.progress + amount); changed = true; }
  }
  if (state.weeklyChallenge && state.weeklyChallenge.type === type && !state.weeklyChallenge.claimed) {
    state.weeklyChallenge.progress = Math.min(state.weeklyChallenge.target, state.weeklyChallenge.progress + amount);
    changed = true;
  }
  if (changed) saveStateDebounced();
}

function claimDailyQuest(questId) {
  if (!state.dailyQuests) return;
  const q = state.dailyQuests.quests.find(qq => qq.id === questId);
  if (!q || q.claimed || q.progress < q.target) return;
  q.claimed = true;
  state.ecailles += q.reward;
  saveStateDebounced();
  showToast(`+${q.reward} écailles !`);
  haptic(30);
  playCoinSound();
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
}

function claimAchievement(id) {
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach || state.achievementsClaimed.includes(id)) return;
  if (ach.progress(state) < ach.target) return;
  state.achievementsClaimed.push(id);
  state.ecailles += ach.reward;
  saveStateDebounced();
  showToast(`Succès débloqué : ${ach.name} (+${ach.reward} écailles)`);
  haptic([30, 40, 60]);
  playAchievementSound();
  renderTopBar();
  if (ui.screen === 'dragondex') renderScreenDragondex();
}

/* ---- persistance (localStorage) ---- */
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(freshDefaultState(), parsed);
    }
  } catch (e) { /* pas de sauvegarde valide */ }
}
function saveStateDebounced() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) { /* stockage indisponible */ }
  }, 300);
}

/* ---- export / import de la sauvegarde (fichier .json) ----
   Permet de conserver sa progression d'une mise à jour du fichier HTML à l'autre :
   on exporte un fichier .json depuis l'ancienne version, on l'importe dans la nouvelle. */

const SAVE_FILE_FORMAT_VERSION = 1;

function buildSaveFileContents() {
  return JSON.stringify({
    app: 'lumidra',
    formatVersion: SAVE_FILE_FORMAT_VERSION,
    exportedAt: new Date().toISOString(),
    state,
  }, null, 2);
}

function exportSave() {
  try {
    const contents = buildSaveFileContents();
    const blob = new Blob([contents], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const dateStr = new Date().toISOString().slice(0, 10);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lumidra-sauvegarde-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast('Sauvegarde exportée !');
  } catch (e) {
    showToast("Impossible d'exporter la sauvegarde");
  }
}

// Vérifie grossièrement qu'un objet importé ressemble bien à un état Lumidra valide,
// pour éviter d'écraser la progression actuelle avec un fichier invalide ou corrompu.
function looksLikeValidState(obj) {
  if (!obj || typeof obj !== 'object') return false;
  if (!Array.isArray(obj.dragons)) return false;
  if (!Array.isArray(obj.discovered)) return false;
  if (typeof obj.xp !== 'number') return false;
  if (typeof obj.ecailles !== 'number') return false;
  return true;
}

function handleImportedFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      // Le fichier peut être soit une enveloppe { app, formatVersion, state }, soit un état brut.
      const candidate = (parsed && typeof parsed === 'object' && parsed.state) ? parsed.state : parsed;
      if (!looksLikeValidState(candidate)) {
        showToast('Fichier de sauvegarde invalide');
        return;
      }
      ui.pendingImport = candidate;
      ui.confirmImportOpen = true;
      renderModals();
    } catch (e) {
      showToast('Fichier de sauvegarde illisible');
    }
  };
  reader.onerror = () => showToast('Impossible de lire le fichier');
  reader.readAsText(file);
}

function applyPendingImport() {
  if (!ui.pendingImport) return;
  // Object.assign avec DEFAULT_STATE en base : si la nouvelle version du jeu a ajouté
  // des champs qui n'existaient pas dans l'ancienne sauvegarde, ils gardent leur valeur par défaut.
  state = Object.assign(freshDefaultState(), ui.pendingImport);
  document.body.classList.toggle('gentle-fx', !!state.gentleAnimations);
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) { /* stockage indisponible */ }
  ui.pendingImport = null;
  ui.confirmImportOpen = false;
  ui.screen = 'sanctuaire';
  ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
  renderAll();
  showToast('Sauvegarde importée !');
}

function getActiveEvent() {
  const now = new Date();
  const m = now.getMonth() + 1, d = now.getDate();
  const inRange = (ev) => {
    const after = (mm, dd) => mm > ev.startMonth || (mm === ev.startMonth && dd >= ev.startDay);
    const before = (mm, dd) => mm < ev.endMonth || (mm === ev.endMonth && dd <= ev.endDay);
    if (ev.startMonth <= ev.endMonth) return after(m, d) && before(m, d);
    return after(m, d) || before(m, d); // fenêtre à cheval sur le nouvel an
  };
  return EVENTS.find(inRange) || null;
}

function seasonalEventBannerHtml() {
  const ev = getActiveEvent();
  if (!ev) return '';
  return `<div class="rounded-2xl p-3\\.5 mb-3 flex items-center gap-3" style="padding:14px;background:linear-gradient(135deg,#FDEDD3,#FBDCC0)">
    <div style="font-size:26px" aria-hidden="true">${ev.emoji}</div>
    <div class="flex-1">
      <div class="font-display font-bold fs-12" style="color:var(--ink)">${escapeHtml(ev.name)}</div>
      <div class="font-body fs-11" style="color:var(--ink-soft)">${escapeHtml(ev.tagline)}</div>
    </div>
  </div>`;
}

function dragonHabitatCardHtml(dragon, busy) {
  const species = speciesById(dragon.speciesId);
  const happyDots = Math.min(4, 1 + Math.floor(dragon.careCount / 3));

  for (let i = 0; i < 4; i++) dots += `<span class="w-1\\.5 h-1\\.5 rounded-full" style="width:6px;height:6px;background:${i < happyDots ? 'var(--gold)' : '#E6DFD3'}"></span>`;
  return `<button data-action="open-dragon" data-dragon-id="${dragon.id}" class="rounded-2xl p-2\\.5 flex flex-col items-center relative shadow-sm" style="padding:10px;background:var(--parchment);opacity:${busy ? 0.6 : 1}">

function sortedDragonsForDisplay() {
  let list = state.dragons.slice();
  const search = (ui.sanctuaireSearch || '').trim();
  if (search) {
    const q = normalizeSearch(search);
    list = list.filter(d => normalizeSearch(dragonDisplayName(d, speciesById(d.speciesId))).includes(q));
  }
  const sort = ui.sanctuaireSort || 'recent';
  if (sort === 'favoris') {
    list.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0) || b.bornAt - a.bornAt);
  } else if (sort === 'alpha') {
    list.sort((a, b) => dragonDisplayName(a, speciesById(a.speciesId)).localeCompare(dragonDisplayName(b, speciesById(b.speciesId)), 'fr'));
  } else if (sort === 'rarete') {
    list.sort((a, b) => speciesById(b.speciesId).variant - speciesById(a.speciesId).variant || b.bornAt - a.bornAt);
  } else {
    list.sort((a, b) => b.bornAt - a.bornAt);
  }
  return list;
}

function zonesPathMapHtml() {
  const level = computeLevel(state.xp);
  const n = ZONES.length;
  const xs = [76, 244, 76, 244, 160]; // alternance gauche/droite façon "parcours"
  const ySpacing = 132;
  const yStart = 56;
  const points = ZONES.map((z, i) => ({ zone: z, x: xs[i % xs.length], y: yStart + i * ySpacing, unlocked: level >= z.unlockLevel }));
  const firstLockedIndex = points.findIndex(p => !p.unlocked);

  let pathD = '';
  points.forEach((p, i) => {
    if (i === 0) { pathD += `M ${p.x},${p.y}`; }
    else {
      const prev = points[i - 1];
      const midY = (prev.y + p.y) / 2;
      pathD += ` C ${prev.x},${midY} ${p.x},${midY} ${p.x},${p.y}`;
    }
  });
  const totalHeight = yStart + (n - 1) * ySpacing + 70;

  const nodesHtml = points.map((p, i) => {
    const { zone, unlocked } = p;
    const isNext = i === (firstLockedIndex === -1 ? -1 : firstLockedIndex);
    const chips = zone.elements.map(el => {
      const c = ELEMENTS[el];
      return icon(c.icon, { size: 13, color: unlocked ? c.deep : '#B7AF9E' });
    }).join('');
    return `<div style="position:absolute;left:${(p.x / 320) * 100}%;top:${p.y}px;transform:translate(-50%,-50%);width:96px;text-align:center;">
      ${isNext ? `<div style="position:absolute;left:50%;top:-30px;transform:translateX(-50%);font-size:22px" aria-hidden="true" class="anim-float">📍</div>` : ''}
      <button data-action="carte-open-zone" data-zone-id="${zone.id}" data-locked="${unlocked ? '0' : '1'}" aria-label="${escapeHtml(zone.name)}${unlocked ? '' : ' (verrouillé)'}"
        class="rounded-full flex items-center justify-center relative ${unlocked ? 'dragon-anim-idle' : ''}"
        style="width:66px;height:66px;margin:0 auto;background:${unlocked ? 'linear-gradient(135deg,var(--gold),var(--gold-deep-btn))' : '#D8CFC0'};box-shadow:0 4px 0 ${unlocked ? 'var(--gold-deep)' : '#B7AF9E'};border:3px solid #fff;animation-delay:${(i * 0.35).toFixed(2)}s">
        ${unlocked ? `<span style="display:flex;gap:1px">${chips}</span>` : icon('lock', { size: 18, color: '#8C8371' })}
      </button>
      <div class="font-display font-bold" style="font-size:10px;margin-top:6px;color:${unlocked ? 'var(--ink)' : 'var(--ink-soft)'};line-height:1.2">${escapeHtml(zone.name)}</div>
      ${!unlocked ? `<div class="font-body font-bold" style="font-size:9px;color:var(--ink-soft)">Niveau ${zone.unlockLevel}</div>` : ''}
    </div>`;
  }).join('');

  return `<div style="position:relative;width:100%;height:${totalHeight}px;">
    <svg viewBox="0 0 320 ${totalHeight}" style="position:absolute;top:0;left:0;width:100%;height:100%" preserveAspectRatio="none" aria-hidden="true">
      <path d="${pathD}" fill="none" stroke="#D8CFC0" stroke-width="7" stroke-linecap="round" stroke-dasharray="3 15"/>
      <path d="${pathD}" fill="none" stroke="var(--gold)" stroke-width="7" stroke-linecap="round" stroke-dasharray="3 15" opacity="0.85"
        style="clip-path:inset(0 0 ${Math.max(0, 100 - ((firstLockedIndex === -1 ? n - 1 : firstLockedIndex) / (n - 1)) * 100)}% 0)"/>
    </svg>
    ${nodesHtml}
  </div>`;
}

function typesPathHtml(types) {
  const stepColors = ['#8FBF7F', '#E0AA3E', '#E8734A', '#B5502C', '#8A6FBF'];
  return `<div class="flex flex-col">${types.map((t, i) => {
    const color = stepColors[i % stepColors.length];
    const isLast = i === types.length - 1;
    return `<div style="display:flex;gap:10px;align-items:stretch">
      <div style="display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0">
        <div class="font-display font-bold shrink-0" style="width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;background:${color};color:#fff;font-size:12px">${i + 1}</div>

          ${t.tagline ? `<div class="font-body fs-10 mt-1" style="color:var(--gold-deep)">${escapeHtml(t.tagline)}</div>` : ''}

function activeExpeditionCardHtml(exp) {
  const zone = ZONES.find(z => z.id === exp.zoneId);
  const remaining = exp.endAt - now;
  const ready = remaining <= 0;
  return `<div class="rounded-2xl p-3 flex items-center gap-3" style="background:${ready ? 'linear-gradient(135deg,#FFF3DC,#FCE3B8)' : 'var(--parchment)'}">
    <div class="flex-1">
      <div class="font-display font-bold text-xs" style="color:var(--ink)">${escapeHtml(zone.name)}</div>
      <div class="font-body font-bold fs-11" style="color:${ready ? 'var(--gold-deep)' : 'var(--ink-soft)'}">${ready ? 'Expédition terminée !' : `Retour dans ${fmtCountdown(remaining)}`}</div>
    </div>
    ${ready ? `<button data-action="carte-claim" data-exp-id="${exp.id}" class="font-display font-bold text-xs px-3\\.5 py-2 rounded-xl" style="padding:8px 14px;background:var(--gold);color:var(--ink)">Récupérer</button>` : icon('clock', { size: 18, color: 'var(--ink-soft)' })}
  </div>`;

function teamPickerHtml(zone, availableDragons) {
  const teamIds = ui.carte.teamIds;
  const team = availableDragons.filter(d => teamIds.includes(d.id));
  const temperamentSet = {};
  team.forEach(d => { temperamentSet[d.temperament] = true; });
  const distinct = Object.keys(temperamentSet).length;
  const harmonyBonus = distinct >= 2 ? 20 : 0;

  let totalVig = 0, totalEclat = 0;
  team.forEach(d => { const st = computeDragonStats(d, zone); totalVig += st.vigueur; totalEclat += st.eclat; });
  const avgVig = team.length ? Math.min(100, Math.round(totalVig / team.length)) : 0;
  const avgEclat = team.length ? Math.min(100, Math.round(totalEclat / team.length + harmonyBonus * 0.3)) : 0;
  const harmonie = team.length ? Math.min(100, 30 + harmonyBonus + team.length * 10) : 0;

  let grid;
  if (availableDragons.length === 0) {
    grid = emptyNoteHtml('Aucun dragon disponible pour une équipe.');
  } else {
    grid = `<div class="grid grid-cols-4 gap-2 mb-3">${availableDragons.map(d => {
      const s = speciesById(d.speciesId);
      const picked = teamIds.includes(d.id);
      return `<button data-action="carte-toggle-team-member" data-dragon-id="${d.id}" class="rounded-xl p-1\\.5 flex flex-col items-center relative" style="padding:6px;background:${picked ? '#FFF3DC' : 'var(--parchment)'};outline:${picked ? '2px solid var(--gold)' : 'none'}">
        ${picked ? `<span style="position:absolute;top:4px;right:4px">${icon('check', { size: 11, color: 'var(--gold-deep)' })}</span>` : ''}
        ${dragonSVG({ element: s.element, variant: s.variant, stage: d.stage, size: 44 })}
      </button>`;
    }).join('')}</div>`;
  }

  return `<div>
    ${grid}
    <div class="font-display font-bold text-xs mb-1\\.5" style="margin-bottom:6px;color:var(--ink-soft)">Équipe (${teamIds.length}/3)</div>
    ${statBarHtml('Vigueur', avgVig)}
    ${statBarHtml('Éclat', avgEclat)}
    ${statBarHtml('Harmonie', harmonie)}
    ${harmonyBonus > 0 ? `<div class="font-body font-semibold fs-11 mt-1" style="color:var(--gold-deep)">💡 Tempéraments variés : bonus d'harmonie actif</div>` : ''}
    <button data-action="carte-confirm-team" ${teamIds.length < 2 ? 'disabled' : ''} class="btn-primary full mt-3" style="margin-top:12px;">Lancer l'expédition</button>
  </div>`;
}

function renderScreenLabo() {
  const busy = busyDragonIds();
  const eligible = state.dragons.filter(d => d.stage === 'adulte' && !busy[d.id]);
  const { parentAId, parentBId, picking } = ui.labo;
  const a = parentAId ? state.dragons.find(d => d.id === parentAId) : null;
  const b = parentBId ? state.dragons.find(d => d.id === parentBId) : null;

  const slotHtml = (dragon, slot) => {
    if (!dragon) {
      return `<button data-action="labo-open-picker" data-slot="${slot}" class="rounded-2xl flex flex-col items-center justify-center gap-1" style="height:120px;border:2px dashed #D8CFC0;background:rgba(255,255,255,.4)">

        <span class="font-body font-bold fs-11" style="color:var(--ink-soft)">Choisir</span>
      </button>`;
    }
    const species = speciesById(dragon.speciesId);
    return `<button data-action="labo-open-picker" data-slot="${slot}" class="rounded-2xl flex flex-col items-center p-2" style="height:120px;background:var(--parchment)">
      ${dragonSVG({ element: species.element, variant: species.variant, stage: 'adulte', size: 72 })}
      <div class="font-display font-bold fs-11 mt-1" style="color:var(--ink)">${escapeHtml(dragonDisplayName(dragon, species))}</div>
    </button>`;
  };

  const cooldownLeft = Math.max(0, (state.laboCooldownUntil || 0) - Date.now());
  const onCooldown = cooldownLeft > 0;
  const canBreed = a && b && a.id !== b.id && !onCooldown && state.ecailles >= BREED_COST;

  let pickerHtml = '';
  if (picking) {
    const already = picking === 'a' ? parentBId : parentAId;
    const options = eligible.filter(d => d.id !== already);
    pickerHtml = `<div class="rounded-2xl p-3 mb-3" style="background:var(--parchment)">
      <div class="flex items-center justify-between mb-2">
        <div class="font-display font-bold fs-12" style="color:var(--ink)">Choisir un parent</div>

      </div>
      ${options.length === 0 ? emptyNoteHtml('Aucun autre dragon adulte disponible.') : `
      <div class="grid grid-cols-3 gap-2">${options.map(d => {
        const species = speciesById(d.speciesId);
        return `<button data-action="labo-select-parent" data-slot="${picking}" data-dragon-id="${d.id}" class="rounded-xl flex flex-col items-center p-1\\.5" style="background:var(--sky)">
          ${dragonSVG({ element: species.element, variant: species.variant, stage: 'adulte', size: 50 })}
          <div class="font-body font-bold" style="font-size:9px;color:var(--ink)">${escapeHtml(dragonDisplayName(d, species))}</div>
        </button>`;
      }).join('')}</div>`}
    </div>`;
  }

  document.getElementById('screen-root').innerHTML = `
  <div class="flex-1 overflow-y-auto px-4 pb-4">
    <h3 class="font-display font-bold text-sm mb-1" style="color:var(--ink)">Laboratoire</h3>
    <p class="font-body font-semibold fs-11 mb-3" style="color:var(--ink-soft)">Associe deux dragons adultes pour obtenir un œuf inattendu — parfois même légendaire.</p>
    ${eligible.length < 2 && !(a && b) ? emptyNoteHtml('Il te faut au moins 2 dragons adultes, non occupés, pour tenter un élevage.') : ''}
    ${pickerHtml}
    <div class="grid grid-cols-2 gap-3 mb-3">${slotHtml(a, 'a')}${slotHtml(b, 'b')}</div>
    <button data-action="breed-dragons" ${canBreed ? '' : 'disabled'} class="w-full font-display font-bold text-sm py-3 rounded-2xl flex items-center justify-center gap-2" style="background:${canBreed ? 'var(--gold)' : '#D8CFC0'};color:var(--ink)">
      ${onCooldown ? `Disponible dans ${fmtCountdown(cooldownLeft)}` : `${coinIconHtml()} Élever (${BREED_COST})`}
    </button>
  </div>`;
}

function getFocusableElements(container) {
  if (!container) return [];
  return Array.from(container.querySelectorAll(
    'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
  ));
}

let modalIsOpen = false;
let modalReturnFocusEl = null;

function renderModals() {
  const root = document.getElementById('modal-root');
  let html = '';

  if (ui.hatchFlow) html += hatchModalHtml(ui.hatchFlow);
  else if (ui.detailDragonId) {
    const dragon = state.dragons.find(d => d.id === ui.detailDragonId);
    if (dragon) html += dragonDetailModalHtml(dragon);
  } else if (ui.detailSpecies) html += speciesDetailModalHtml(ui.detailSpecies);
  else if (ui.lockChallenge) html += lockChallengeModalHtml(ui.lockChallenge);
  else if (ui.confirmResetOpen) html += confirmResetModalHtml();
  else if (ui.confirmImportOpen) html += confirmImportModalHtml();
  else if (ui.tutorialStep !== null) html += tutorialModalHtml();

  // Piège de focus clavier : mémorise l'élément déclencheur à l'ouverture,
  // le restaure à la fermeture, pour ne jamais laisser le focus s'échapper
  // vers le contenu masqué derrière la modale.
  const opening = !!html && !modalIsOpen;
  if (opening) modalReturnFocusEl = document.activeElement;

  root.innerHTML = html;

  if (html) {
    modalIsOpen = true;
    const sheet = root.querySelector('.modal-sheet');
    if (sheet && !sheet.contains(document.activeElement)) {
      const focusables = getFocusableElements(sheet);
      (focusables[0] || sheet).focus({ preventScroll: true });
    }
  } else if (modalIsOpen) {
    modalIsOpen = false;
    if (modalReturnFocusEl && document.body.contains(modalReturnFocusEl) && typeof modalReturnFocusEl.focus === 'function') {

function wrapTextLines(text, maxChars) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).trim().length > maxChars) { lines.push(cur.trim()); cur = w; }
    else { cur = (cur + ' ' + w).trim(); }
  });
  if (cur) lines.push(cur.trim());
  return lines;
}

function buildDragonCardSVG(dragon, species) {
  const c = ELEMENTS[species.element];
  const dragonMarkup = dragonSVG({ element: species.element, variant: species.variant, stage: dragon.stage, size: 260 });
  const name = escapeHtml(dragonDisplayName(dragon, species));
  const subtitle = `${ELEMENTS[species.element].name} · ${RARITY_LABEL[species.variant]}`;
  const loreLines = wrapTextLines(species.lore, 42);
  const loreTspans = loreLines.map((line, i) => `<tspan x="320" dy="${i === 0 ? 0 : 24}">${escapeHtml(line)}</tspan>`).join('');
  const starsRow = Array.from({ length: 3 }).map((_, i) =>
    i < RARITY_STARS[species.variant]
      ? `<path transform="translate(${290 + i * 30},520) scale(1.1)" d="${starPath(0, 0, 9, 3.6, 5)}" fill="#E0AA3E"/>`
      : `<path transform="translate(${290 + i * 30},520) scale(1.1)" d="${starPath(0, 0, 9, 3.6, 5)}" fill="#E6DFD3"/>`
  ).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="900" viewBox="0 0 640 900">
    <defs>
      <linearGradient id="cardbg" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${c.light}"/>
        <stop offset="100%" stop-color="${c.base}"/>
      </linearGradient>
    </defs>
    <rect width="640" height="900" rx="0" fill="url(#cardbg)"/>
    <rect x="20" y="20" width="600" height="860" rx="28" fill="#FFFBF2" opacity="0.94" stroke="#fff" stroke-width="3"/>
    <g transform="translate(190,70)">${dragonMarkup}</g>
    <text x="320" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="${INK}">${name}</text>
    <g>${starsRow}</g>
    <text x="320" y="555" text-anchor="middle" font-family="Verdana, sans-serif" font-size="17" font-weight="700" fill="${c.deep}">${escapeHtml(subtitle)}</text>
    <text x="320" y="605" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="17" fill="${INK}">${loreTspans}</text>
    <text x="320" y="850" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" font-weight="700" fill="${c.deep}" opacity="0.75">🐉 Lumidra</text>
  </svg>`;
}

function exportDragonCard(dragonId) {
  const dragon = state.dragons.find(d => d.id === dragonId);
  if (!dragon) return;
  const species = speciesById(dragon.speciesId);
  try {
    const svgStr = buildDragonCardSVG(dragon, species);
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const slug = dragonDisplayName(dragon, species).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    const a = document.createElement('a');
    a.href = url;
    a.download = `lumidra-${slug || 'dragon'}.svg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast('Carte du dragon téléchargée !');
    haptic(20);
  } catch (e) {
    showToast('Impossible de générer la carte');
  }
}

let holdGateRAF = null;
let holdGateStartAt = null;
let holdGateSucceeded = false;

function wireHoldGate(onSuccess) {
  const btn = document.getElementById('hold-gate-btn');
  const ring = document.getElementById('hold-gate-progress');
  const iconSlot = document.getElementById('hold-gate-icon');
  const instructions = document.getElementById('hold-gate-instructions');
  if (!btn || !ring) return;
  holdGateSucceeded = false;

  function paint(pct) {
    ring.setAttribute('stroke-dashoffset', String(HOLD_GATE_CIRCUMFERENCE * (1 - pct)));
  }
  function tick() {
    if (holdGateStartAt === null) return;
    const elapsed = Date.now() - holdGateStartAt;
    const pct = Math.min(1, elapsed / HOLD_GATE_DURATION_MS);
    paint(pct);
    if (pct >= 1) {
      holdGateStartAt = null;
      succeed();
      return;
    }
    holdGateRAF = requestAnimationFrame(tick);
  }
  function succeed() {
    // Séquence de réussite visible avant de changer d'écran : plus rien ne se passe "en silence".
    holdGateSucceeded = true;
    btn.classList.remove('hold-gate--pressed');
    btn.classList.add('hold-gate--success');
    ring.setAttribute('stroke', '#6FA05C');
    if (iconSlot) {
      iconSlot.innerHTML = icon('check', { size: 24, color: '#436B37', className: 'hold-gate-icon--success' });
    }
    if (instructions) instructions.textContent = 'Déverrouillé !';
    haptic([20, 30, 50]);
    setTimeout(onSuccess, 550);
  }
  function start(e) {
    if (holdGateSucceeded) return;
    e.preventDefault();
    btn.classList.add('hold-gate--pressed');
    holdGateStartAt = Date.now();
    tick();
  }
  function cancel() {
    if (holdGateSucceeded) return; // ne pas effacer l'anneau juste après une réussite
    holdGateStartAt = null;
    if (holdGateRAF) cancelAnimationFrame(holdGateRAF);
    btn.classList.remove('hold-gate--pressed');
    paint(0);
  }

  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', cancel);
  btn.addEventListener('pointerleave', cancel);
  btn.addEventListener('pointercancel', cancel);
}

  } else {
    ensureDailyQuests();
    ensureWeeklyChallenge();
    document.getElementById('onboarding-root').style.display = 'none';
    document.getElementById('main-shell').style.display = 'flex';
    renderTopBar();
    renderScreenByName(ui.screen);
    renderNavBar();
  }
  renderModals();
  renderToast();
}

function renderScreenByName(name) {

  else if (name === 'dragondex') renderScreenDragondex();
  else if (name === 'carte') renderScreenCarte();
  else if (name === 'boutique') renderScreenBoutique();

function requestScreen(target) {

    ui.lockChallenge = { onSuccessScreen: 'reglages' };

function completeOnboarding() {
  const nameInput = document.getElementById('onboarding-name-input');
  const name = nameInput ? nameInput.value.trim() : '';
  const mode = ui.onboarding.mode;
  const commons0 = SPECIES.filter(s => s.variant === 0);
  const starter = commons0[randInt(0, commons0.length - 1)];
  const egg = { id: uid('egg'), speciesId: starter.id, obtainedAt: Date.now() };

  state.onboarded = true;
  state.gardienName = name || 'Gardien';
  state.mode = mode;
  state.eggInbox = [egg];
  checkLoginStreak();
  saveStateDebounced();

  ui.hatchFlow = { egg, taps: 0, revealedDragon: null };

function careAllDragons() {
  const busy = busyDragonIds();
  let caredCount = 0;
  let grownCount = 0;
  state.dragons.forEach(d => {
    if (busy[d.id]) return;
    if (d.lastCareAt && (Date.now() - d.lastCareAt) < CARE_COOLDOWN_MS) return;
    const careCount = d.careCount + 1;
    const newStage = computeStage(careCount);
    if (newStage !== d.stage) grownCount += 1;
    d.careCount = careCount;
    d.lastCareAt = Date.now();
    d.stage = newStage;
    caredCount += 1;
  });
  if (caredCount === 0) { showToast('Aucun dragon disponible pour un câlin pour le moment'); return; }
  addXp(caredCount);
  bumpQuestProgress('soin', caredCount);
  saveStateDebounced();
  playCareSound();
  haptic(30);
  showToast(grownCount > 0
    ? `${caredCount} dragon${caredCount > 1 ? 's' : ''} câliné${caredCount > 1 ? 's' : ''}, dont ${grownCount} qui grandi${grownCount > 1 ? 'ssent' : 't'} ! ✨`
    : `${caredCount} dragon${caredCount > 1 ? 's' : ''} câliné${caredCount > 1 ? 's' : ''} !`);
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
}

function careDragon(dragonId) {
  const d = state.dragons.find(dd => dd.id === dragonId);
  if (!d) return;
  if (d.lastCareAt && (Date.now() - d.lastCareAt) < CARE_COOLDOWN_MS) return;
  const careCount = d.careCount + 1;
  const newStage = computeStage(careCount);
  const grew = newStage !== d.stage;
  d.careCount = careCount;
  d.lastCareAt = Date.now();
  d.stage = newStage;
  addXp(1);
  bumpQuestProgress('soin', 1);
  saveStateDebounced();
  if (grew) { showToast(`${speciesById(d.speciesId).name} a grandi ! ✨`); playHatchSound(); }
  else { playCareSound(); }
  renderTopBar();
  if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
  renderModals();
}

function createDragon(speciesId) {
  return {
    id: uid('drg'), speciesId, stage: 'bebe', careCount: 0, lastCareAt: 0,
    temperament: TEMPERAMENTS[randInt(0, 3)], bornAt: Date.now(),
    customName: null, favorite: false,
  };
}

function resolveHatch() {
  const flow = ui.hatchFlow;
  const egg = flow.egg;
  const species = speciesById(egg.speciesId);
  const newDragon = createDragon(egg.speciesId);
  const newlyDiscovered = !state.discovered.includes(egg.speciesId);
  state.eggInbox = state.eggInbox.filter(e => e.id !== egg.id);
  state.dragons.push(newDragon);
  if (newlyDiscovered) state.discovered.push(egg.speciesId);
  addXp(10);
  state.statsEggsHatched = (state.statsEggsHatched || 0) + 1;
  bumpQuestProgress('eclosion', 1);
  haptic(newlyDiscovered ? [30, 40, 60] : 40);
  playHatchSound();

  const justCompleted = newlyDiscovered && state.discovered.length === SPECIES.length && !state.collectionCompleteShown;
  if (justCompleted) {
    state.collectionCompleteShown = true;
    showToast('Dragondex complet ! Tu es un Maître Gardien ✨🏆');
    haptic([40, 60, 40, 60, 80]);
  }

  saveStateDebounced();
  ui.hatchFlow = { egg, taps: flow.taps, revealedDragon: newDragon };
  renderModals();
}

/* =========================================================================
   NOTIFICATIONS NATIVES (Capacitor uniquement — no-op silencieux ailleurs)
   ========================================================================= */
function hasNativeNotifications() {
  return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()
    && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications);
}
function notifIdForExpedition(expId) {
  let h = 0;
  for (let i = 0; i < expId.length; i++) h = (h * 31 + expId.charCodeAt(i)) >>> 0;
  return h % 2147483647;
}
async function scheduleExpeditionNotification(exp) {
  if (!hasNativeNotifications()) return;
  try {
    const { LocalNotifications } = window.Capacitor.Plugins;
    const current = await LocalNotifications.checkPermissions();
    if (current.display !== 'granted') {
      const requested = await LocalNotifications.requestPermissions();
      if (requested.display !== 'granted') return;
    }
    await LocalNotifications.schedule({
      notifications: [{
        id: notifIdForExpedition(exp.id),
        title: 'Lumidra',
        body: 'Ton expédition est terminée — un trésor t\u2019attend au sanctuaire ! 🐉',
        schedule: { at: new Date(exp.endAt) },
      }],
    });
  } catch (e) {}
}
async function cancelExpeditionNotification(expId) {
  if (!hasNativeNotifications()) return;
  try {
    await window.Capacitor.Plugins.LocalNotifications.cancel({ notifications: [{ id: notifIdForExpedition(expId) }] });
  } catch (e) {}
}

function startExpedition(zoneId, typeId, dragonIds) {
  const type = EXPEDITION_TYPES.find(t => t.id === typeId);
  const newExp = { id: uid('exp'), zoneId, typeId, dragonIds, startAt: Date.now(), endAt: Date.now() + type.seconds * 1000 };
  state.expeditions.push(newExp);
  scheduleExpeditionNotification(newExp);
  bumpQuestProgress('expedition', 1);
  saveStateDebounced();
  showToast('Expédition lancée !');
  ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
  if (ui.screen === 'carte') renderScreenCarte();
}

/* =========================================================================
   LUMIDRA — laboratoire d'élevage
   ========================================================================= */

// Coût et cooldown recalibrés (audit économie) : les quêtes/défis/série de connexion
// injectent aujourd'hui bien plus d'écailles qu'au moment du réglage initial (80/2h).
const BREED_COST = 120;
const BREED_COOLDOWN_MS = 3 * 60 * 60 * 1000;

function pickBreedingSpecies(speciesA, speciesB) {
  const sameElement = speciesA.element === speciesB.element;
  const legendaryPool = SPECIES.filter(s => s.variant === 4 && (s.element === speciesA.element || s.element === speciesB.element));
  if (legendaryPool.length && Math.random() < 0.04) {
    return legendaryPool[randInt(0, legendaryPool.length - 1)];
  }
  const pool = SPECIES.filter(s => s.variant < 4 && (s.element === speciesA.element || s.element === speciesB.element));
  const weighted = [];
  pool.forEach(s => {
    const w = s.variant <= 1 ? 4 : s.variant === 2 ? 3 : 2;
    for (let i = 0; i < w; i++) weighted.push(s);
  });
  return weighted[randInt(0, weighted.length - 1)] || (sameElement ? speciesA : speciesA);
}

function breedDragons() {
  const { parentAId, parentBId } = ui.labo;
  if (!parentAId || !parentBId || parentAId === parentBId) return;
  if (Date.now() < (state.laboCooldownUntil || 0)) return;
  if (state.ecailles < BREED_COST) { showToast("Pas assez d'écailles"); return; }
  const busy = busyDragonIds();
  const a = state.dragons.find(d => d.id === parentAId);
  const b = state.dragons.find(d => d.id === parentBId);
  if (!a || !b || a.stage !== 'adulte' || b.stage !== 'adulte' || busy[a.id] || busy[b.id]) return;
  const resultSpecies = pickBreedingSpecies(speciesById(a.speciesId), speciesById(b.speciesId));
  state.ecailles -= BREED_COST;
  state.laboCooldownUntil = Date.now() + BREED_COOLDOWN_MS;
  state.statsBredCount = (state.statsBredCount || 0) + 1;
  state.eggInbox.push({ id: uid('egg'), speciesId: resultSpecies.id, obtainedAt: Date.now() });
  ui.labo = { parentAId: null, parentBId: null, picking: null };
  saveStateDebounced();
  haptic([20, 40, 20]);
  showToast('Un œuf est apparu au Laboratoire !');
  renderTopBar();
  renderScreenLabo();
}

// Jusqu'ici la fiche d'équipe (harmonie de tempérament, vigueur/éclat moyens) n'était
// qu'un aperçu décoratif au moment de lancer l'expédition. Elle influence désormais
// vraiment la récolte : diversité de tempérament + éclat moyen de l'équipe.
function computeTeamBonus(dragonIds, zone) {
  if (!dragonIds || dragonIds.length === 0) return { eggChanceBonus: 0, ecaillesBonus: 0 };
  const team = dragonIds.map(id => state.dragons.find(d => d.id === id)).filter(Boolean);
  if (team.length === 0) return { eggChanceBonus: 0, ecaillesBonus: 0 };
  const temperamentSet = {};
  team.forEach(d => { temperamentSet[d.temperament] = true; });
  const harmonyBonus = Object.keys(temperamentSet).length >= 2 ? 0.08 : 0;
  let totalEclat = 0;
  team.forEach(d => { totalEclat += computeDragonStats(d, zone).eclat; });
  const avgEclat = totalEclat / team.length;
  const statBonus = Math.min(0.15, avgEclat / 500);
  return { eggChanceBonus: harmonyBonus + statBonus, ecaillesBonus: Math.round(avgEclat * 0.4) };
}

function claimExpedition(expId) {
  const exp = state.expeditions.find(e => e.id === expId);
  if (!exp || exp.endAt > Date.now()) return;
  const type = EXPEDITION_TYPES.find(t => t.id === exp.typeId);
  const zone = ZONES.find(z => z.id === exp.zoneId);
  const teamBonus = computeTeamBonus(exp.dragonIds, zone);
  let ecaillesGain = randInt(type.ecaillesMin, type.ecaillesMax) + teamBonus.ecaillesBonus;
  let gotEgg = null;
  let gotLegendary = false;
  if (Math.random() < Math.min(0.95, type.eggChance + teamBonus.eggChanceBonus)) {
    const picked = weightedSpeciesFromZone(zone, type.legendaryChance || 0);
    if (picked.variant === 4) gotLegendary = true;
    if (!state.discovered.includes(picked.id)) gotEgg = { id: uid('egg'), speciesId: picked.id, obtainedAt: Date.now() };
    else ecaillesGain += 40;
  }
  state.ecailles += ecaillesGain;
  addXp(5);
  state.statsExpeditionsCompleted = (state.statsExpeditionsCompleted || 0) + 1;
  if (gotEgg) state.eggInbox.push(gotEgg);
  state.expeditions = state.expeditions.filter(e => e.id !== expId);
  bumpQuestProgress('collecte', ecaillesGain);
  state.expeditionLog = state.expeditionLog || [];
  state.expeditionLog.unshift({ zoneName: zone.name, typeName: type.name, ecailles: ecaillesGain, gotEgg: !!gotEgg, legendary: gotLegendary, at: Date.now() });
  if (state.expeditionLog.length > 15) state.expeditionLog.length = 15;
  saveStateDebounced();
  haptic(gotEgg ? [25, 50, 50] : 30);
  playCoinSound();
  showToast(gotLegendary ? `Un œuf légendaire scintille dans ta besace ! ✨` : gotEgg ? `+${ecaillesGain} écailles et un nouvel œuf !` : `+${ecaillesGain} écailles`);
  renderTopBar();
  if (ui.screen === 'carte') renderScreenCarte();
}

function buyDecor(decorId) {
  const decor = DECOR.find(d => d.id === decorId);
  if (!decor || state.decorOwned.includes(decorId) || state.ecailles < decor.cost) return;
  if (decor.seasonal) {
    const ev = getActiveEvent();
    if (!ev || ev.id !== decor.seasonal) { showToast("Cette décoration n'est pas disponible en ce moment"); return; }
  }
  state.ecailles -= decor.cost;
  state.decorOwned.push(decorId);
  saveStateDebounced();
  showToast(`${decor.name} ajouté !`);
  renderTopBar();
  renderScreenBoutique();
}

function toggleEquipDecor(decorId) {
  const equipped = state.decorEquipped.includes(decorId);
  if (!equipped && state.decorEquipped.length >= 3) { showToast('Maximum 3 décorations affichées'); return; }
  state.decorEquipped = equipped ? state.decorEquipped.filter(id => id !== decorId) : [...state.decorEquipped, decorId];
  saveStateDebounced();
  renderScreenBoutique();
}

function doReset() {
  state.expeditions.forEach(exp => cancelExpeditionNotification(exp.id));
  state = freshDefaultState();
  document.body.classList.remove('gentle-fx');
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  ui.screen = 'sanctuaire';
  ui.confirmResetOpen = false;
  ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
  renderAll();
}

   ========================================================================= */

function dispatchAction(action, dataset, evt, el) {
  const dragonId = dataset.dragonId;
  const speciesId = dataset.speciesId;
  const zoneId = dataset.zoneId;
  const typeId = dataset.typeId;
  const decorId = dataset.decorId;
  const mode = dataset.mode;
  const elementKey = dataset.element;
  const screenName = dataset.screen;
  const expId = dataset.expId;

  switch (action) {
    case 'select-mode':
      ui.onboarding.mode = mode;
      renderOnboarding();
      break;
    case 'complete-onboarding':
      completeOnboarding();
      break;
    case 'open-settings':
      requestScreen('reglages');
      break;
    case 'nav':
      requestScreen(screenName);
      break;
    case 'open-dragon':
      ui.detailDragonId = dragonId;
      renderModals();
      break;
    case 'close-dragon-detail':
      ui.detailDragonId = null;
      ui.releaseConfirmId = null;
      renderModals();
      break;
    case 'set-sanctuaire-sort':
      ui.sanctuaireSort = dataset.sort;
      renderScreenSanctuaire();
      break;
    case 'labo-open-picker':
      ui.labo.picking = dataset.slot;
      renderScreenLabo();
      { const closeBtn = document.querySelector('[data-action="labo-close-picker"]'); if (closeBtn) closeBtn.focus(); }
      break;
    case 'labo-close-picker':
      ui.labo.picking = null;
      renderScreenLabo();
      break;
    case 'labo-select-parent':
      if (dataset.slot === 'a') ui.labo.parentAId = dataset.dragonId;
      else ui.labo.parentBId = dataset.dragonId;
      ui.labo.picking = null;
      renderScreenLabo();
      break;
    case 'breed-dragons':
      breedDragons();
      break;
    case 'care-all-dragons':
      careAllDragons();
      break;
    case 'care-dragon':
      careDragon(dragonId);
      break;
    case 'rename-dragon': {
      const input = document.getElementById('dragon-rename-input');
      const val = input ? input.value.trim() : '';
      const d = state.dragons.find(dd => dd.id === dragonId);
      if (d) {
        d.customName = val || null;
        saveStateDebounced();
        showToast('Nom mis à jour');
        renderModals();
        if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
      }
      break;
    }
    case 'toggle-favorite': {
      const d = state.dragons.find(dd => dd.id === dragonId);
      if (d) {
        d.favorite = !d.favorite;
        saveStateDebounced();
        haptic(20);
        renderModals();
        if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
      }
      break;
    }
    case 'share-dragon-card':
      exportDragonCard(dragonId);
      break;
    case 'request-release-dragon':
      ui.releaseConfirmId = dragonId;
      renderModals();
      break;
    case 'cancel-release-dragon':
      ui.releaseConfirmId = null;
      renderModals();
      break;
    case 'confirm-release-dragon': {
      const d = state.dragons.find(dd => dd.id === dragonId);
      if (d && !busyDragonIds()[d.id]) {
        const species = speciesById(d.speciesId);
        const refund = RELEASE_REFUND[species.variant];
        state.dragons = state.dragons.filter(dd => dd.id !== dragonId);
        state.ecailles += refund;
        ui.releaseConfirmId = null;
        ui.detailDragonId = null;
        saveStateDebounced();
        showToast(`${dragonDisplayName(d, species)} relâché (+${refund} écailles)`);
        renderTopBar();
        renderModals();
        if (ui.screen === 'sanctuaire') renderScreenSanctuaire();
      }
      break;
    }
    case 'start-hatch-from-inbox':
      if (state.eggInbox.length > 0) { ui.hatchFlow = { egg: state.eggInbox[0], taps: 0, revealedDragon: null }; renderModals(); }
      break;
    case 'hatch-tap':
      ui.hatchFlow.taps = Math.min(3, ui.hatchFlow.taps + 1);
      if (ui.hatchFlow.taps >= 3 && !ui.hatchFlow.revealedDragon) resolveHatch();
      else renderModals();
      break;
    case 'hatch-finish':
      ui.hatchFlow = null;
      renderAll();
      if (!state.tutorialSeen) {
        state.tutorialSeen = true;
        saveStateDebounced();
        ui.tutorialStep = 0;
        setTimeout(() => renderModals(), 350);
      }
      break;
    case 'hatch-finish-and-continue':
      if (state.eggInbox.length > 0) {
        ui.hatchFlow = { egg: state.eggInbox[0], taps: 0, revealedDragon: null };
        renderAll();
      } else {
        ui.hatchFlow = null;
        renderAll();
      }
      break;
    case 'tutorial-next':
      if (ui.tutorialStep < TUTORIAL_SLIDES.length - 1) { ui.tutorialStep += 1; renderModals(); }
      else { ui.tutorialStep = null; renderModals(); }
      break;
    case 'tutorial-skip':
      ui.tutorialStep = null;
      renderModals();
      break;
    case 'open-species': {
      const sp = speciesById(speciesId);
      ui.detailSpecies = { species: sp, discovered: state.discovered.includes(speciesId) };
      renderModals();
      break;
    }
    case 'close-species-detail':
      ui.detailSpecies = null;
      renderModals();
      break;
    case 'dragondex-filter':
      ui.dragondexFilter = elementKey;
      renderScreenDragondex();
      break;
    case 'dragondex-rarity-filter':
      ui.dragondexRarityFilter = dataset.rarity;
      renderScreenDragondex();
      break;
    case 'carte-open-zone': {
      const zone = ZONES.find(z => z.id === zoneId);
      if (computeLevel(state.xp) < zone.unlockLevel) {
        showToast(`Niveau ${zone.unlockLevel} requis pour débloquer cette zone`);
        if (el) { el.classList.remove('anim-shake'); void el.offsetWidth; el.classList.add('anim-shake'); }
        break;
      }
      ui.carte = { view: 'types', zoneId: zoneId, typeId: null, teamIds: [] };
      renderScreenCarte();
      break;
    }
    case 'carte-back': {
      if (ui.carte.view === 'types') ui.carte = { view: 'zones', zoneId: null, typeId: null, teamIds: [] };
      else ui.carte.view = 'types';
      renderScreenCarte();
      break;
    }
    case 'carte-choose-type': {
      const type = EXPEDITION_TYPES.find(t => t.id === typeId);
      ui.carte.typeId = typeId;
      ui.carte.teamIds = [];
      ui.carte.view = type.team ? 'team' : 'pick1';
      renderScreenCarte();
      break;
    }
    case 'carte-pick-single':
      startExpedition(ui.carte.zoneId, ui.carte.typeId, [dragonId]);
      break;
    case 'carte-toggle-team-member': {
      const ids = ui.carte.teamIds;
      if (ids.includes(dragonId)) ui.carte.teamIds = ids.filter(x => x !== dragonId);
      else if (ids.length < 3) ui.carte.teamIds = [...ids, dragonId];
      renderScreenCarte();
      break;
    }
    case 'carte-confirm-team':
      if (ui.carte.teamIds.length >= 2) startExpedition(ui.carte.zoneId, ui.carte.typeId, ui.carte.teamIds);
      break;
    case 'carte-claim':
      claimExpedition(expId);
      break;
    case 'buy-decor':
      buyDecor(decorId);
      break;
    case 'toggle-equip-decor':
      toggleEquipDecor(decorId);
      break;
    case 'select-title':
      state.selectedTitle = dataset.titleId || null;
      saveStateDebounced();
      renderTopBar();
      renderScreenReglages();
      break;
    case 'toggle-parental-lock':
      state.parentalLock = !state.parentalLock;
      saveStateDebounced();
      renderScreenReglages();
      break;
    case 'toggle-reduce-vibrations':
      state.reduceVibrations = !state.reduceVibrations;
      saveStateDebounced();
      renderScreenReglages();
      break;
    case 'toggle-sound':
      state.soundEnabled = !state.soundEnabled;
      saveStateDebounced();
      if (state.soundEnabled) playCoinSound();
      renderScreenReglages();
      break;
    case 'toggle-gentle-animations':
      state.gentleAnimations = !state.gentleAnimations;
      document.body.classList.toggle('gentle-fx', state.gentleAnimations);
      saveStateDebounced();
      renderScreenReglages();
      break;
    case 'toggle-collection-banner':
      state.collectionBannerCollapsed = !state.collectionBannerCollapsed;
      saveStateDebounced();
      renderScreenDragondex();
      break;
    case 'toggle-achievements-banner':
