name: Build Lumidra APK

# Se déclenche à chaque push sur main, et manuellement depuis l'onglet "Actions" du repo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer Java (requis par Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Accepter les licences du SDK Android (sécurité supplémentaire)
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Installer les dépendances npm
        run: npm install

      - name: Synchroniser le projet Android (copie www/ + régénère les plugins Capacitor/Cordova)
        id: capcopy
        run: npx cap sync android > /tmp/capcopy.log 2>&1
        continue-on-error: true

      - name: Afficher le log de copie (toujours, réussite ou non)
        if: always()
        run: cat /tmp/capcopy.log

      - name: Publier le diagnostic en commentaire si l'étape précédente a échoué
        if: steps.capcopy.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 /tmp/capcopy.log > /tmp/capcopy_trimmed.log
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -F body=@/tmp/capcopy_trimmed.log || true

      - name: Échouer explicitement si la copie a échoué
        if: steps.capcopy.outcome == 'failure'
        run: exit 1

      - name: Construire l'APK (debug, prêt à installer directement)
        id: gradlebuild
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace > /tmp/gradle.log 2>&1
        continue-on-error: true

      - name: Afficher le log Gradle (toujours)
        if: always()
        run: tail -c 8000 /tmp/gradle.log

      - name: Publier le diagnostic Gradle en commentaire si échec
        if: steps.gradlebuild.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 /tmp/gradle.log > /tmp/gradle_trimmed.log
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -F body=@/tmp/gradle_trimmed.log || true

      - name: Échouer explicitement si la construction a échoué
        if: steps.gradlebuild.outcome == 'failure'
        run: exit 1

      - name: Mettre l'APK à disposition en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: lumidra-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
