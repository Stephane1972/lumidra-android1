name: Build Lumidra APK

# Se déclenche à chaque push sur main, et manuellement depuis l'onglet "Actions" du repo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Java (requis par Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Accepter les licences du SDK Android (sécurité supplémentaire)
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Installer les dépendances npm
        run: npm install

      - name: Copier les assets web (www/ → android/app/src/main/assets/public)
        run: npx cap copy android

      - name: Construire l'APK (debug, prêt à installer directement)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Mettre l'APK à disposition en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: lumidra-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
